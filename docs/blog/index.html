<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>0xdya | Articles</title>
  <link rel="stylesheet" href="../css/static.css">
  <link rel="icon" href="../img/icon.jpg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap');

    :root {
      --bg: #080808;
      --text: #e8e8e8;
      --muted: #888;
      --dim: #555;
      --accent: #c8b560;
      --accent-dim: rgba(200, 181, 96, .12);
      --border: rgba(255, 255, 255, .07);
      --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;
    --space-7: 48px;
    --space-8: 64px;
    --space-9: 96px;
    --text-xs: .78rem;
    --text-sm: .88rem;
    --text-base: 1.02rem;
    --text-lg: 1.2rem;
    --text-xl: 1.55rem;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: .88rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      padding-bottom: 96px;
    }

  

    .container {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    a { text-decoration: none; color: inherit; }

    /* header */

    h1 {
      font-size: var(--text-xl);
      font-weight: 400;
      color: var(--text);
      margin-bottom: var(--space-8);
    }
    .sub {
      color: var(--dim);
      font-size: .78rem;
      margin-bottom: 48px;
    }

    /* divider */
    .divider {
      font-size: .78rem;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* article card */
    .article {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: border-color .2s, background .2s;
    }
    .article:hover {
      border-color: rgba(200,181,96,.25);
      background: var(--accent-dim);
    }

    .article-title { color: var(--text); }
    .article-meta {
      font-size: .78rem;
      color: var(--dim);
      margin-top: 3px;
    }
    .article-tag {
      color: var(--accent);
      opacity: .8;
      margin-right: 10px;
    }
    .article-arrow {
      color: var(--dim);
      flex-shrink: 0;
      transition: transform .2s, color .2s;
    }
    .article:hover .article-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

  </style>
</head>
<body>

  <div class="container">

          <span class="article-tag">#general</span>

        </div>
      </div>
      <svg class="article-arrow" width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M8.91 19.92l6.52-6.52c.77-.77.77-2.03 0-2.8L8.91 4.08"/>
      </svg>

  </div>

</body>
</html>
