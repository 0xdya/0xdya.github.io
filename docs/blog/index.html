<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>آخر ظهور</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --card: #161b25;
      --border: #1e2a3a;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
      --online: #22c55e;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .avatar-section {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--accent);
    }

    .avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      border: 2px solid var(--accent);
      flex-shrink: 0;
    }

    .user-info h2 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .user-info p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .dot.online { background: var(--online); box-shadow: 0 0 6px var(--online); }

    .last-login-box {
      background: rgba(59, 130, 246, 0.05);
      border: 1px solid rgba(59, 130, 246, 0.15);
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
    }

    .label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 0.4rem;
      letter-spacing: 0.05em;
    }

    .time-ago {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .exact-time {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    .loading {
      color: var(--muted);
      font-size: 0.9rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .error { color: #f87171; font-size: 0.85rem; }
  </style>
</head>
<body>

<div class="card">
  <div class="avatar-section">
    <div class="avatar-placeholder" id="avatarEl">O</div>
    <div class="user-info">
      <h2 id="userName"><span class="loading">جارٍ التحميل...</span></h2>
      <p id="userEmail"></p>
      <div class="status-row">
        <div class="dot" id="statusDot"></div>
        <span id="statusText" style="font-size:0.8rem;color:var(--muted)"></span>
      </div>
    </div>
  </div>

  <div class="last-login-box">
    <div class="label">آخر ظهور</div>
    <div class="time-ago" id="timeAgo"><span class="loading">...</span></div>
    <div class="exact-time" id="exactTime"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC2U0aM8mUrYoDI0R9pYbzQZk1g9zd96O0",
    authDomain: "oxdyaa.firebaseapp.com",
    projectId: "oxdyaa",
    storageBucket: "oxdyaa.appspot.com",
    messagingSenderId: "604062703590",
    appId: "1:604062703590:web:924c0cbd8a988f4fcf8027"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const USER_ID = "X18SfoEU7JhtQC3Xsn0o9punnI23";

  function timeAgoAr(date) {
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return `منذ ${diff} ثانية`;
    if (diff < 3600) return `منذ ${Math.floor(diff / 60)} دقيقة`;
    if (diff < 86400) return `منذ ${Math.floor(diff / 3600)} ساعة`;
    if (diff < 2592000) return `منذ ${Math.floor(diff / 86400)} يوم`;
    return `منذ ${Math.floor(diff / 2592000)} شهر`;
  }

  function formatExact(date) {
    return date.toLocaleString('ar-DZ', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function isRecentlyOnline(date) {
    return (new Date() - date) < 5 * 60 * 1000; // 5 minutes
  }

  try {
    const ref = doc(db, "users", USER_ID);
    const snap = await getDoc(ref);

    if (snap.exists()) {
      const data = snap.data();
      const lastLoginDate = data.lastLogin?.toDate();

      // Name
      document.getElementById("userName").textContent = data.name || "مجهول";
      document.getElementById("userEmail").textContent = data.email || "";

      // Avatar initials
      const initial = (data.name || "?")[0].toUpperCase();
      document.getElementById("avatarEl").textContent = initial;

      // Photo
      if (data.photo) {
        const img = document.createElement("img");
        img.src = data.photo;
        img.className = "avatar";
        img.alt = data.name;
        img.onerror = () => {};
        document.getElementById("avatarEl").replaceWith(img);
      }

      // Last login
      if (lastLoginDate) {
        const ago = timeAgoAr(lastLoginDate);
        document.getElementById("timeAgo").textContent = ago;
        document.getElementById("exactTime").textContent = formatExact(lastLoginDate);

        const dot = document.getElementById("statusDot");
        const statusText = document.getElementById("statusText");
        if (isRecentlyOnline(lastLoginDate)) {
          dot.classList.add("online");
          statusText.textContent = "متصل الآن";
          statusText.style.color = "var(--online)";
        } else {
          statusText.textContent = ago;
        }

        // Auto-refresh every minute
        setInterval(() => {
          document.getElementById("timeAgo").textContent = timeAgoAr(lastLoginDate);
          if (!isRecentlyOnline(lastLoginDate)) {
            document.getElementById("statusText").textContent = timeAgoAr(lastLoginDate);
          }
        }, 60000);
      } else {
        document.getElementById("timeAgo").textContent = "غير متاح";
      }
    } else {
      document.getElementById("timeAgo").innerHTML = '<span class="error">المستخدم غير موجود</span>';
    }
  } catch (e) {
    console.error(e);
    document.getElementById("timeAgo").innerHTML = '<span class="error">خطأ في الاتصال</span>';
  }
</script>

</body>
</html>
