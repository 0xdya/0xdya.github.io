<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects — 0xdya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script type="module" src="../js/user.js"></script>
  <link href="../css/static.css" rel="stylesheet">
  <style>
    h1 {
      font-size: var(--text-xl);
      font-weight: 400;
      color: var(--text);
      margin-bottom: var(--space-8);
    }

    .sub {
      color: var(--dim);
      font-size: .78rem;
      margin-bottom: 48px;
    }

    .divider {
      font-size: .78rem;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .article {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      transition: border-color .2s, background .2s;
    }

    .article:hover {
      border-color: rgba(200, 181, 96, .25);
      background: var(--accent-dim);
    }

    .article-title {
      color: var(--text);
    }

    .article-meta {
      font-size: .78rem;
      color: var(--dim);
      margin-top: 3px;
    }

    .article-tag {
      color: var(--accent);
      opacity: .8;
      margin-right: 10px;
    }

    .article-arrow {
      color: var(--dim);
      flex-shrink: 0;
      transition: transform .2s, color .2s;
    }

    .article:hover .article-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    @keyframes fadeUp {
      0% {
        opacity: 0;
        transform: translateY(var(--space-4));
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp .5s ease forwards;
    }

    .animate:nth-child(1) {
      animation-delay: 0ms;
    }

    /* .animate:nth-child(2) { animation-delay: 55ms; }
.animate:nth-child(3) { animation-delay: 110ms; }
.animate:nth-child(4) { animation-delay: 165ms; } */
  </style>
</head>

<body>

  <div class="container">

        <div class="article-meta">
          <span class="article-tag">#general</span>
          <span>2025-06-28</span>
        </div>
      </div>
      <svg class="article-arrow" width="16" height="16" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M8.91 19.92l6.52-6.52c.77-.77.77-2.03 0-2.8L8.91 4.08" />
      </svg>
    </a>

  </div>

  <div class="navbar_section">

          <polyline points="9 22 9 12 15 12 15 22" />

      <a href="../projects/" class="nav-item">

          <rect x="14" y="3" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
        </svg>

      <a href="./" class="nav-item active">

      <a href="../contact/" class="nav-item">

</body>

</html>
