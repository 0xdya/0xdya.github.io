<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
<title>0xdya — skin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500&family=Inter:wght@300;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --accent: #ffffff;
    --text-dim: rgba(255, 255, 255, 0.5);
    --mono: 'JetBrains Mono', monospace;
  }

  body {
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
    overflow: hidden;
    font-family: var(--mono);
    color: var(--accent);
  }

  #skin_container {
    inset: 0;
    cursor: grab;
    display: block;
    z-index: 5;
    filter: drop-shadow(0 20px 50px rgba(0,0,0,0.5));
  }
  #skin_container:active { cursor: grabbing; }

  .ui-element {
    position: fixed;
    z-index: 10;
    pointer-events: auto;
    animation: fadeIn 1.2s ease-out;
  }

  .ui-tl { top: 40px; left: 40px; }
  .ui-br { bottom: 40px; right: 40px; text-align: right; }

  .accent-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: -0.02em;
    opacity: 0.8;
    transition: opacity 0.3s;
  }
  .accent-link:hover { opacity: 1; }

  .label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.2em;
    margin-bottom: 4px;
  }

  .frame-corner {
    position: fixed;
    width: 20px;
    height: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    pointer-events: none;
  }
  .top-left { top: 20px; left: 20px; border-right: none; border-bottom: none; }
  .bottom-right { bottom: 20px; right: 20px; border-left: none; border-top: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  ::-webkit-scrollbar { display: none; }
</style>
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

<div class="frame-corner top-left"></div>
<div class="frame-corner bottom-right"></div>

<div class="ui-element ui-tl">
  <span class="label">my owen skin...</span>
  <a href="../" class="accent-link">0xdya_</a>
</div>

<div class="ui-element ui-br">
  <span class="label">Visualizer</span>
  <div style="font-size: 11px; color: var(--text-dim)">v2.0 // STABLE</div>
</div>

<canvas id="skin_container"></canvas>

<script src="https://unpkg.com/skinview3d/bundles/skinview3d.bundle.js"></script>
<script>
const THREE = skinview3d.THREE;

const viewer = new skinview3d.SkinViewer({
  canvas: document.getElementById("skin_container"),
  width: window.innerWidth,
  height: window.innerHeight,
  skin: "https://0xdya.vercel.app/skin/s2.png",
});

viewer.zoom = 0.8;
viewer.autoRotate = true;
viewer.autoRotateSpeed = 0.5;

viewer.renderer.shadowMap.enabled = true;
viewer.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

viewer.scene.children.slice().forEach(c => { if (c.isLight) viewer.scene.remove(c); });

const ambient = new THREE.AmbientLight(0xffffff, 0.4);
viewer.scene.add(ambient);

const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
mainLight.position.set(5, 10, 7);
mainLight.castShadow = true;
viewer.scene.add(mainLight);

const blueFill = new THREE.DirectionalLight(0x4466ff, 0.5); 
blueFill.position.set(-5, 5, -5);
viewer.scene.add(blueFill);

const floorGeo = new THREE.PlaneGeometry(100, 100);
const floorMat = new THREE.ShadowMaterial({ opacity: 0.3 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -30;
floor.receiveShadow = true;
viewer.scene.add(floor);

viewer.playerObject.traverse(obj => {
  if (obj.isMesh) {
    obj.castShadow = true;
    obj.receiveShadow = true;
  }
});

let targetX = 0, targetY = 0;
let currentX = 0, currentY = 0;
let isDragging = false;

window.addEventListener("mousemove", (e) => {
  if (!isDragging) {
    targetX = (e.clientX / window.innerWidth - 0.5) * 0.5;
    targetY = (e.clientY / window.innerHeight - 0.5) * 0.3;
  }
});

function loop() {
  currentX += (targetX - currentX) * 0.05;
  currentY += (targetY - currentY) * 0.05;
  
  if (!isDragging) {
    viewer.playerObject.rotation.y += 0.005; 
  }
  
  viewer.playerObject.rotation.y += currentX * 0.1;
  viewer.playerObject.rotation.x = currentY;

  requestAnimationFrame(loop);
}
loop();

window.addEventListener("resize", () => {
  viewer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
