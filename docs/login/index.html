<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <title>login | 0xdya</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/static.css"/>
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
        <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
        <script src="../js/loader.js"></script>
        <style>
            body {
                display: flex;
                justify-content: center;
                flex-direction: column;
            }

            .login_terminal {
                background-color: #000;
                max-width: 320px;
                margin: 0 auto;
                border: 1px solid beige;
                padding: 20px;
                display: flex;
                flex-direction: column;
                line-height: 1.6;
                font-size: var(--text-base);
            }

            .prompt {
                color: #888;
            }

            button {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                width: 100%;
                max-width: 312px;
                padding: 12px 24px;
                background: #0d0d0d;
                color: #e8e8e8;
                border: 1px solid #2a2a2a;
                border-radius: 8px;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.9rem;
                cursor: pointer;
                transition: all 0.2s ease;
                margin: 10px auto 0;
            }

            button:hover {
                background: #1a1a1a;
                border-color: #555;
                color: #fff;
                transform: translateY(-1px);
            }

            .user-info {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 1rem;
                border-bottom: 1px dashed #444;
                padding-bottom: 10px;
            }

            .user-info img {
                width: 32px;
                height: 32px;
                border-radius: 50%;
            }

            #message {
                color: #0af;
                font-size: 0.95rem;
            }
            #error {
                color: red;
                margin-top: 10px;
            }

            p {
                font-size: 14px;
                text-align: left;
                line-height: 1.6;
                color: #ececec;
            }

            .login_note {
                width: 100%;
                padding: 0 20px;
                border: 1px solid #444;
                background: #060606;
                line-height: 1;
                filter: sepia(40%);
            }

            ion-icon {
                margin-bottom: -2px;
                padding: 0;
            }

            .none {
                display: none;
            }

            .flex {
                display: flex;
                flex-direction: column;
            }

            #loader {
                margin: 1rem 0 0;
                background: #000;
                color: #0af;
                font-family: monospace;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: 16px;
            }

            #loginComand {
                margin-top: 1rem;
                line-height: 1.6;
                font-size: var(--text-sm);
            }

            #emailInput {
                width: 100%;
                padding: 8px 20px;
                background: #060606;
                color: white;
                border: 1px solid #444;
                position: relative;
            }

            input[type="email"] {
                width: 100%;
                max-width: 400px;
                padding: 12px 16px;
                font-size: 1rem;
                font-family: inherit;
                border: 1px solid #444;
                border-radius: 4px;
                background-color: #111;
                color: #fff;
                outline: none;
                transition: 0.3s ease all;
            }

            input[type="email"]::placeholder {
                color: #888;
                font-size: 12px;
            }
            input[type="email"]:hover {
                border-color: #666;
            }
            input[type="email"]:focus {
                border: 1px solid white !important;
            }
            input[type="email"]:invalid {
                border-color: #ff4d4d;
            }
            input[type="email"]:required:invalid {
                background-color: #1a0000;
            }

            #sendLoginLink {
                width: 100%;
                max-width: 312px;
                margin: 8px auto 0;
                padding: 8px 0;
                background: #2c1f14;
                color: #e6d3a3;
                border: 1px solid #3a2a1c;
                border-radius: 6px;
                font-family: "JetBrains Mono", monospace;
                font-size: 0.9rem;
                cursor: pointer;
                text-align: center;
                transition: background 0.15s ease, border 0.15s ease;
            }

            #sendLoginLink:hover {
                background: #332417;
                border-color: #4a3422;
            }
            #sendLoginLink:active {
                background: #24190f;
            }
            #sendLoginLink:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }


            #emailLoginBox {
                position: relative;
                margin: 1rem 0;
            }

            #login-buttons {
                display: none;
            }

            .modal {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.85);
                display: flex;
                align-items: center;
                justify-content: center;
                z-index: 9999;
            }

            .modal-content {
                background: #111;
                padding: 3rem 2rem;
                border-radius: 12px;
                text-align: center;
                max-width: 400px;
                width: 90%;
                border: 1px solid #333;
            }

            .modal-content h2 {
                color: #0ff;
                margin-bottom: 1rem;
            }

            .modal-content input[type="text"] {
                width: 100%;
                padding: 0.7rem 1rem;
                margin-bottom: 1rem;
                border: 1px solid #444;
                border-radius: 8px;
                background: #222;
                color: #fff;
                font-family: "JetBrains Mono", monospace;
                font-size: 1rem;
                outline: none;
                box-sizing: border-box;
            }

            .modal-content input[type="text"]:focus {
                border-color: #0ff;
            }

            .modal-content button {
                background: #0ff;
                color: #000;
                padding: 0.6rem 1.2rem;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                font-weight: bold;
                max-width: 200px;
            }
            #emailPromptModal .modal-content p {
                color: #aaa;
                margin-bottom: 1rem;
                font-size: 0.9rem;
            }

            #emailPromptModal .modal-content input[type="email"] {
                max-width: 100%;
                box-sizing: border-box;
                margin-bottom: 1rem;
            }

            #emailPromptModal .modal-content button {
                background: #0af;
                color: #000;
            }

            @media(max-width: 480px) {
                input[type="email"] {
                    font-size: 0.9rem;
                    padding: 10px 14px;
                }
            }

            @media(min-width: 600px) {
                .login_terminal {
                    max-width: 420px;
                }
                button {
                    max-width: 412px;
                }
                #sendLoginLink {
                    max-width: 412px;
                }
            }
        </style>
        <script>
          window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
        </script>
        <script defer src="/_vercel/insights/script.js"></script>
        <script defer src="/_vercel/speed-insights/script.js"></script>
    </head>
    <div class="bg" id="loader-wrapper">
        <div class="loader"></div>
    </div>
    <body>

        <div id="nameModal" style="display: none;" class="modal">
            <div class="modal-content">
                <h2>welcome 🐐</h2>
                <input type="text" id="nameInput" placeholder="choose ur username (>= 3 chars)"/>
                <button id="saveNameBtn">save</button>
            </div>
        </div>

        <div id="emailPromptModal" style="display: none;" class="modal">
            <div class="modal-content">
                <h2>confirm ur email 📧</h2>
                <p>you opened the link on a different device. enter ur email to continue.</p>
                <input type="email" id="promptEmailInput" placeholder="your@email.com"/>
                <button id="confirmEmailBtn">confirm</button>
            </div>
        </div>

        <div class="login_terminal">
            <div class="login_note">
                <img width="100%" src="lain.gif">
            </div>

            <div id="loader">
                <span>Authenticating...</span>
            </div>

            <div id="loginComand" class="none" dir="ltr">
                <span class="prompt">0xdya@auth:~$</span>
                sudo login
            </div>

            <div class="none" dir="ltr" id="userComand" style="text-align:left">
                <div id="message"></div><br>
                <span class="prompt">0xdya@auth:~$</span>
                account-info
            </div>

            <div class="flex">
                <div id="userInfo" class="user-info none">
                    <img id="userPhoto" src="" alt="User Photo">
                    <div id="userName"></div>
                </div>
                <div id="userDetails" style="font-size: 13px; line-height: 1.4;"></div>
            </div>

            <div id="login-buttons">
                <div id="emailLoginBox">
                    <input type="email" id="emailInput" placeholder="ur email to get login link"/>
                    <div id="sendLoginLink">send login link 📨</div>
                </div>
            </div>

            <div id="error"></div>

            <div id="userSection" class="none">
                <button onclick="location.href='https://0xdya.vercel.app/profile/'" id="profile">Go to Profile</button>
                <button id="logoutBtn">logout</button>
            </div>
        </div>

        <div id="continuewith">
            <button id="googleLogin" dir="ltr">
                <ion-icon name="logo-google"></ion-icon>
                <span class="home_title_font">
                    continue with Google
                </span>
            </button>
            <button id="githubLogin" dir="ltr">
                <ion-icon name="logo-github"></ion-icon>
                <span class="home_title_font">
                    continue with GitHub
                </span>
            </button>
        </div>

        <div class="navbar_section">
            <nav class="navbar">
                <a href="../" class="nav-item">
                    <svg class="nav-icon" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                    <span class="nav-text">Home</span>
                </a>
                <a href="../projects/" class="nav-item">
                    <svg class="nav-icon" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <span class="nav-text">Projects</span>
                </a>
                <a href="../blog/" class="nav-item">
                    <svg class="nav-icon" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                    <span class="nav-text">Articles</span>
                </a>
                <a href="../contact/" class="nav-item">
                    <svg class="nav-icon" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                        <polyline points="22,6 12,13 2,6"/>
                    </svg>
                    <span class="nav-text">Contact</span>
                </a>
            </nav>
            <nav class="navbar">
                <a href="../comments/" class="nav-item  comments">
                    <svg class="nav-icon" viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span class="nav-text">Comments</span>
                </a>
                <div class="user_photo  profile" id="userPhotoContainer"></div>
            </nav>
        </div>
        <script type="module" src="../js/login.js"></script>
    </body>
</html>
