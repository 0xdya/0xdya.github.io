        <style>
            body {

            .login_terminal {

            input[type="email"]::placeholder {

            input[type="email"]:focus {

            input[type="email"]:invalid {

            #sendLoginLink {

            .modal {

                align-items: center;

            .modal-content {

            .modal-content h2 {

            .modal-content input[type="text"] {
                width: 100%;

                margin-bottom: 1rem;
                border: 1px solid #444;

            .modal-content input[type="text"]:focus {

            }

            .modal-content button {

                cursor: pointer;

            #emailPromptModal .modal-content p {

            #emailPromptModal .modal-content input[type="email"] {

            #emailPromptModal .modal-content button {

            @media(max-width: 480px) {

            @media(min-width: 600px) {

                }
                button {
                    max-width: 412px;
                }
                #sendLoginLink {
                    max-width: 412px;
                }
            }
        </style>

        <script type="module">
            import {initializeApp} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
            import {
                getAuth,
                GoogleAuthProvider,
                GithubAuthProvider,
                signInWithPopup,
                signOut,
                onAuthStateChanged,
                sendSignInLinkToEmail,
                isSignInWithEmailLink,
                signInWithEmailLink,
                fetchSignInMethodsForEmail
            } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
            import {
                getFirestore,
                doc,
                setDoc,
                getDocFromServer,
                serverTimestamp
            } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
            import {getDatabase, ref, runTransaction} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-database.js";

            const firebaseConfig = {
                apiKey: "AIzaSyC2U0aM8mUrYoDI0R9pYbzQZk1g9zd96O0",
                authDomain: "oxdyaa.firebaseapp.com",
                projectId: "oxdyaa",
                storageBucket: "oxdyaa.appspot.com",
                messagingSenderId: "604062703590",
                appId: "1:604062703590:web:924c0cbd8a988f4fcf8027"
            };

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const rtdb = getDatabase(app);

            const providers = {
                google: new GoogleAuthProvider(),
                github: new GithubAuthProvider()
            };

            const continuewith = document.getElementById("continuewith");
            const loginBtns = document.getElementById("login-buttons");
            const userSection = document.getElementById("userSection");
            const userInfo = document.getElementById("userInfo");
            const userComand = document.getElementById("userComand");
            const loginComand = document.getElementById("loginComand");
            const userName = document.getElementById("userName");
            const userPhoto = document.getElementById("userPhoto");
            const errorEl = document.getElementById("error");
            const message = document.getElementById("message");
            const loader = document.getElementById("loader");
            const emailInput = document.getElementById("emailInput");

            function showLoggedIn() {
                loginBtns.style.display = "none";
                continuewith.style.display = "none";
                userSection.style.display = "block";
                userInfo.style.display = "flex";
                userComand.style.display = "block";
                loginComand.style.display = "block";
            }

            function showLoggedOut() {
                loginBtns.style.display = "block";
                continuewith.style.display = "block";
                userSection.style.display = "none";
                userInfo.style.display = "none";
                userComand.style.display = "none";
                loginComand.style.display = "block";
                message.textContent = "";
            }

            async function initUserData(user) {
                const userRef = doc(db, "users", user.uid);
                const defaultPhoto = user.photoURL || "https://0xdya.vercel.app/img/user.jpg";
                const defaultEmail = user.email || "";

                userPhoto.src = defaultPhoto;

                try {
                    const snap = await getDocFromServer(userRef);

                    if (! snap.exists()) {
                        showUsernameModal(user, userRef, defaultPhoto, defaultEmail);
                    } else {
                        const savedName = snap.data().name || "user";
                        userName.textContent = savedName;
                        await setDoc(userRef, {
                            email: defaultEmail,
                            photo: defaultPhoto,
                            lastLogin: serverTimestamp()
                        }, {merge: true});
                    }
                } catch (err) {
                    console.error("Firestore error:", err.code, err.message);
                    errorEl.textContent = "❌ error loading profile: " + err.code;
                }
            }

            function showUsernameModal(user, userRef, defaultPhoto, defaultEmail) {
                const nameModal = document.getElementById("nameModal");
                nameModal.style.display = "flex";

                document.getElementById("saveNameBtn").onclick = async () => {
                    const newName = document.getElementById("nameInput").value.trim();
                    if (newName.length < 3) {
                        alert("⚠️ username must be at least 3 characters");
                        return;
                    }

                    try {
                        await setDoc(userRef, {
                            uid: user.uid,
                            name: newName,
                            email: defaultEmail,
                            photo: defaultPhoto,
                            createdAt: serverTimestamp(),
                            lastLogin: serverTimestamp(),
                            role: "user",
                            hidden: false,
                            verified: false,
                            bio: "",
                            banner: "",
                            social: {
                                github: "",
                                twitter: "",
                                website: ""
                            }
                        });

                        const countRef = ref(rtdb, "users_count");
                        await runTransaction(countRef, c => (c || 0) + 1);

                        userName.textContent = newName;
                        nameModal.style.display = "none";
                        alert("✅ account created successfully!");
                    } catch (err) {
                        console.error("Error creating user:", err);
                        alert("❌ failed to create account: " + err.code);
                    }
                };
            }

            async function loginWithProvider(provider) {
                errorEl.textContent = "";
                try {
                    await signInWithPopup(auth, provider);
                } catch (err) {
                    if (err.code === "auth/account-exists-with-different-credential") {
                        errorEl.textContent = "⚠️ this email is already registered with a different provider (Google/GitHub).";
                    } else if (err.code === "auth/popup-closed-by-user") {} else {
                        errorEl.textContent = "❌ login failed: " + err.code;
                        console.error(err);
                    }
                }
            }
            const actionCodeSettings = {
                url: window.location.origin + window.location.pathname,
                handleCodeInApp: true
            };

            document.getElementById("sendLoginLink").addEventListener("click", async () => {
                const email = emailInput.value.trim();
                if (! email || ! email.includes("@")) {
                    errorEl.textContent = "❌ enter a valid email address.";
                    return;
                }

                errorEl.textContent = "";
                document.getElementById("sendLoginLink").textContent = "sending...";

                try {
                    await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                    window.localStorage.setItem("emailForSignIn", email);
                    emailInput.value = "";
                    document.getElementById("sendLoginLink").textContent = "send login link 📨";
                    alert("📨 link sent! check your inbox or spam folder.");
                } catch (err) {
                    document.getElementById("sendLoginLink").textContent = "send login link 📨";
                    console.error("Send link error:", err.code, err.message);

                    if (err.code === "auth/quota-exceeded") {
                        errorEl.textContent = "❌ daily email limit reached. try Google or GitHub login instead.";
                    } else {
                        errorEl.textContent = "❌ " + err.code;
                    }
                }
            });
            async function handleEmailLink(email) {
                try {
                    const result = await signInWithEmailLink(auth, email, window.location.href);
                    window.localStorage.removeItem("emailForSignIn");

                    window.history.replaceState({}, document.title, window.location.pathname);
                    await initUserData(result.user);
                    message.innerHTML = "login successfully 🐧";
                    showLoggedIn();
                } catch (err) {
                    console.error("Email link sign-in error:", err.code, err.message);
                    if (err.code === "auth/invalid-action-code") {
                        errorEl.textContent = "❌ this link has expired or already been used. please request a new one.";
                    } else if (err.code === "auth/invalid-email") {
                        errorEl.textContent = "❌ wrong email. please try again.";
                    } else {
                        errorEl.textContent = "❌ login failed: " + err.code;
                    } loader.style.display = "none";
                    showLoggedOut();
                }
            }

            if (isSignInWithEmailLink(auth, window.location.href)) {
                loader.style.display = "flex";
                const storedEmail = window.localStorage.getItem("emailForSignIn");

                if (storedEmail) {
                    handleEmailLink(storedEmail);
                } else {
                    loader.style.display = "none";
                    const emailPromptModal = document.getElementById("emailPromptModal");
                    emailPromptModal.style.display = "flex";

                    document.getElementById("confirmEmailBtn").addEventListener("click", () => {
                        const enteredEmail = document.getElementById("promptEmailInput").value.trim();
                        if (! enteredEmail || ! enteredEmail.includes("@")) {
                            alert("⚠️ please enter a valid email.");
                            return;
                        }
                        emailPromptModal.style.display = "none";
                        loader.style.display = "flex";
                        handleEmailLink(enteredEmail);
                    });
                }
            }

            onAuthStateChanged(auth, async user => {
                loader.style.display = "none";

                if (user) {
                    showLoggedIn();
                    await initUserData(user);
                    message.innerHTML = "login successfully 🐧";
                } else {
                    showLoggedOut();
                }
            });

            document.getElementById("logoutBtn").addEventListener("click", async () => {
                try {
                    await signOut(auth);
                } catch (err) {
                    console.error("Logout error:", err);
                    errorEl.textContent = "❌ logout failed: " + err.code;
                }
            });

            document.getElementById("googleLogin").addEventListener("click", () => loginWithProvider(providers.google));
            document.getElementById("githubLogin").addEventListener("click", () => loginWithProvider(providers.github));
        </script>

        <script type="module">
            import {initializeApp} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
            import {
                getFirestore,
                collection,
                doc,
                getDoc,
                updateDoc,
                serverTimestamp,
                query,
                orderBy,
                onSnapshot
            } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
            import {getAuth, onAuthStateChanged} from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";

            const firebaseConfig = {
                apiKey: "AIzaSyC2U0aM8mUrYoDI0R9pYbzQZk1g9zd96O0",
                authDomain: "oxdyaa.firebaseapp.com",
                projectId: "oxdyaa",
                storageBucket: "oxdyaa.appspot.com",
                messagingSenderId: "604062703590",
                appId: "1:604062703590:web:924c0cbd8a988f4fcf8027"
            };

            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            const auth = getAuth(app);

            const CACHE_KEY = "userData";
            const UPDATE_INTERVAL = 10 * 60 * 1000;

            function timeAgo(date) {
                const seconds = Math.floor((Date.now() - date) / 1000);
                if (seconds < 60) 
                    return "just now";
                
                const minutes = Math.floor(seconds / 60);
                if (minutes < 60) 
                    return `joined before ${minutes}m`;
                
                const hours = Math.floor(minutes / 60);
                if (hours < 24) 
                    return `joined before ${hours}h`;
                
                return `joined before ${
                    Math.floor(hours / 24)
                }d`;
            }

            function applyUserUI(photo, name) {
                const container = document.getElementById("userPhotoContainer");
                if (! container) 
                    return;
                

                if (name || photo) {
                    container.innerHTML = `
          <a class="user_photo_href nav-item" href="https://0xdya.vercel.app/profile/">
            <img src="${
                        photo || '../img/user.jpg'
                    }">
          </a>`;
                } else {
                    container.innerHTML = `
          <a href="https://0xdya.vercel.app/login/" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span class="nav-text">Account</span>
          </a>`;
                }
            }

            function loadUsers() {
                const usersDiv = document.getElementById("users");
                if (! usersDiv) 
                    return;
                

                const q = query(collection(db, "users"), orderBy("createdAt", "desc"));
                onSnapshot(q, (snapshot) => {
                    usersDiv.innerHTML = "";
                    snapshot.forEach(docSnap => {
                        const user = docSnap.data();
                        const created = user.createdAt ?. toDate ?. ();
                        const joinedText = created ? timeAgo(created) : "—";
                        const role = user.role || "user";
                        const name = user.name || "no name";
                        const photo = user.photo || "../img/user.jpg";

                        usersDiv.innerHTML += `
            <div class="user-card" onclick="location.href='https://0xdya.vercel.app/@${
                            encodeURIComponent(name)
                        }'">
              <img src="${photo}" alt="user photo">
              <div class="name_and_role">
                <span>${name}</span>
                <div class="rotba">role: <span class="role ${role}">${role}</span></div>
              </div>
              <div class="joined">${joinedText}</div>
            </div>`;
                    });
                });
            }

            document.addEventListener("DOMContentLoaded", () => {
                const cached = localStorage.getItem(CACHE_KEY);
                if (cached) {
                    const data = JSON.parse(cached);
                    applyUserUI(data.photo, data.name);
                } else {
                    applyUserUI(null, null);
                } loadUsers();

                onAuthStateChanged(auth, async user => {
                    if (user) {
                        applyUserUI(user.photoURL, user.displayName);

                        const now = Date.now();
                        const cachedData = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");

                        if (now - (cachedData.lastUpdate || 0) > UPDATE_INTERVAL) {
                            try {
                                const userRef = doc(db, "users", user.uid);
                                const userSnap = await getDoc(userRef);

                                if (userSnap.exists()) {
                                    const updates = {
                                        lastLogin: serverTimestamp()
                                    };
                                    if (user.photoURL && user.photoURL !== userSnap.data().photo) {
                                        updates.photo = user.photoURL;
                                    }
                                    await updateDoc(userRef, updates);
                                }

                                localStorage.setItem(CACHE_KEY, JSON.stringify({photo: user.photoURL, name: user.displayName, email: user.email, lastUpdate: now}));
                            } catch (error) {
                                console.error("Firestore update error:", error);
                            }
                        }
                    } else {
                        localStorage.removeItem(CACHE_KEY);
                        applyUserUI(null, null);
                    }
                });
            });
        </script>
    </body>
</html>
