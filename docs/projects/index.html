    .tab {

      background: transparent;
      color: var(--dim);
      font-size: var(--text-md);

      cursor: pointer;
      transition: all .2s ease;
    }

    .tab:hover {
      color: var(--text);

    }

    .tab.active {

      /* color: var(--link); */
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      position: relative;
      border: 1px solid #111;
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color .2s, background .2s, opacity .35s ease, transform .35s ease;
      opacity: 0;
      transform: translateY(18px);
    }

    .card:hover {
      border-color: var(--border);
      /* background: var(--accent-dim); */
    }

    .card.hidden {
      display: none;
    }

    .card-top {

      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .card-name {
      font-family: "JetBrains Mono", monospace;
      font-size: var(--text-base);
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      opacity: .8;
    }

    .badge {
      /* position: absolute; */
      /* right: var(--space-3); */
      font-size: var(--text-sm);
      color: var(--muted);
      border: none;
      /* padding: 1px 7px; */
      border-radius: 4px;
      opacity: .8;
    }

    .card-desc {
      font-size: var(--text-md);
      color: var(--accent);
      font-weight: 300;
      margin-bottom: 12px;
      line-height: 1.6;
      padding: 0 0 2rem;
      border-bottom: 1px solid var(--border);
      /* text-align: justify; */
      text-indent: 1rem;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      /* direction: rtl; */
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border-color: rgba(200, 181, 96, .03);
      color: var(--muted);
      font-size: .78rem;
      font-family: "JetBrains Mono", monospace;
      transition: all .18s;
      cursor: pointer;
    }

    .btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, .18);
      background: rgba(255, 255, 255, .07);
    }

    .btn.primary {
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .btn.primary:hover {
      background: var(--accent-dim);
    }

    .section-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .4s ease, transform .4s ease;
    }

    .section-wrap.hidden {
      display: none;
    }

    .paint-grid {
      columns: 2;
      column-gap: 10px;
    }

    .paint-item {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: border-color .25s, transform .2s;
    }

    .paint-item:hover {
      border-color: rgba(200, 181, 96, .3);
      transform: translateY(-2px);
    }

    .paint-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform .35s;
    }

    .paint-item .caption {
      display: none;
    }

    .books-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .book {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform .2s;
      max-width: 120px;
    }

    .book:hover {
      transform: translateY(-4px);
    }

    .book-cover {
      width: 110px;
      height: 150px;
      border-radius: 3px 9px 9px 3px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 4px 6px 18px rgba(0, 0, 0, .5), -2px 0 0 rgba(255, 255, 255, .05);
      background: rgba(255, 255, 255, .04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .book-label {
      font-size: .75rem;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
      text-align: center;
      line-height: 1.4;
    }

    .sec-title {
      font-size: var(--text-md);
      color: var(--dim);
      font-family: "JetBrains Mono", monospace;
      text-transform: uppercase;
      letter-spacing: .1em;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--dim);
      font-family: "JetBrains Mono", monospace;
      font-size: .85rem;
      display: none;
    }

    .empty.show {
      display: block;
    }

    @media (min-width: 600px) {
      .paint-grid {
        columns: 3;
      }
    }

    .image-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn .2s ease;
    }

    .image-modal.active {
      display: flex;
    }

    .close-modal {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 40px;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .modal-content {
      max-width: 90%;
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
      animation: zoomIn .2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      from { transform: scale(.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .assistant-popup {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(680px, calc(100vw - 0px));
      /* pointer-events: none; */
      z-index: 9999;
    }
    
    .assistant-popup img {
      position: absolute;
      right: -6.2rem;
      top: 18rem;
      width: 250px;
      /* image-rendering: pixelated; */
      animation: slideIn 1s ease;
      z-index: 999;
    }

    .bubble {
      position: absolute;
      right: 96px;
      top: 14rem;
      background: #111;
      border: 1px solid #222;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      border-bottom-left-radius: 16px;
      padding: 1rem;
      pointer-events: auto;
      animation: slideIn 1.4s ease;
      width: fit-content;
      max-width: 70%;
      font-size: var(--text-base);
    }

        opacity: 1;

      100% {

      visibility: hidden;
      top: 0;
      height: 100vh;
      width: 100vw;
      max-width: 680px;
      /* display: none; */
      margin: 0 auto;
  transition: 
    backdrop-filter 0.4s ease,
    background 0.4s ease,
    opacity 0.4s ease,
    visibility 0.4s;
    }

      background: transparent;
        backdrop-filter: blur(12px);
  opacity: 1;

  pointer-events: auto;

    { href: 'https://noor-book.com/vzl9bwy', img: '../img/المنهاج.png', alt: 'المنهاج', fallback: '📗', label: 'المنهاج المبين في مسالك المتقين' },

  ];

  const PAINT_COUNT = 18;

  function renderBtn(btn) {
    const cls = btn.primary ? 'btn primary' : 'btn';
    return `<a class="${cls}" href="${btn.href}" target="_blank">${ICONS[btn.icon]}${btn.label}</a>`;
  }

  function renderCard(project) {
    const dot = project.active ? 'on' : 'off';
    const descDir = project.descDir ? ` dir="${project.descDir}"` : '';
    return `<div class="card" data-cat="${project.cat}">
      <div class="card-top">
        <div class="card-name">
          <div class="dot ${dot}"></div>${project.name}
        </div>
      </div>
      <p class="card-desc"${descDir}>${project.desc}</p>
      <div class="btns">${project.buttons.map(renderBtn).join('')}</div>
    </div>`;
  }

  function renderBook(book) {
    return `<a href="${book.href}" class="book">
      <div class="book-cover">
        <img src="${book.img}" alt="${book.alt}" onerror="this.parentElement.innerHTML='${book.fallback}'">
      </div>
      <span class="book-label">${book.label}</span>
    </a>`;
  }

  function renderPaint(n) {
    return `<div class="paint-item"><img src="./draw/${n}.webp" loading="lazy" alt=""><div class="caption">#${n}</div></div>`;
  }

  document.getElementById('cards').innerHTML = PROJECTS.map(renderCard).join('');
  document.getElementById('books-row').innerHTML = BOOKS.map(renderBook).join('');
  document.getElementById('paint-grid').innerHTML = Array.from({ length: PAINT_COUNT }, (_, i) => renderPaint(i + 1)).join('');

  const body = document.getElementById('body');
  const tabs = document.querySelectorAll('.tab');
  const cards = document.querySelectorAll('#cards .card');
  const secBooks = document.getElementById('sec-books');
  const secPaint = document.getElementById('sec-paint');
  const empty = document.getElementById('empty');
  const modal = document.getElementById('imageModal');
  const modalImg = document.getElementById('modalImage');
  const closeModal = document.getElementById('closeModal');
  const assistantPopup = document.querySelector('.assistant-popup');
  const skinBtnClose = document.querySelector('.skin_btn_close');

  const validFilters = ['all', 'web', 'tools', 'books', 'paint'];


const skinBtn = document.querySelector('.skin_btn');
let openCount = parseInt(localStorage.getItem('popup_open_count')) || 0;
let isHidden = localStorage.getItem('popup_hidden') === 'true';

setTimeout(() => {
  let openCount = parseInt(localStorage.getItem('popup_open_count')) || 0;
  let isHidden = localStorage.getItem('popup_hidden') === 'true';

  if (isHidden) {
    openCount++; 
    
    if (openCount >= 5) {
      localStorage.setItem('popup_hidden', 'false');
      localStorage.setItem('popup_open_count', '0');
      body.classList.add('popup-open');
    } else {
      localStorage.setItem('popup_open_count', openCount);
      if (assistantPopup) assistantPopup.remove();
    }
  } else {
    body.classList.add('popup-open');
  }
}, 10000);

function hidePopupAndStartCount() {
  body.classList.remove('popup-open');
  assistantPopup.remove();
  localStorage.setItem('popup_hidden', 'true');
  localStorage.setItem('popup_open_count', '0'); 
}

if (skinBtnClose) {
  skinBtnClose.addEventListener('click', hidePopupAndStartCount);
}

if (skinBtn) {
  skinBtn.addEventListener('click', hidePopupAndStartCount);
}

  function animateIn(elements, delay = 0) {
    elements.forEach((el, i) => {
      el.style.transition = 'opacity .35s ease, transform .35s ease';
      el.style.opacity = '0';
      el.style.transform = 'translateY(16px)';

      requestAnimationFrame(() => {
        setTimeout(() => {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        }, delay + i * 55);
      });
    });
  }

  function applyFilter(f) {
    if (!validFilters.includes(f)) f = 'tools';

    const visibleCards = [];

    cards.forEach(c => {
      c.classList.add('hidden');
      c.style.opacity = '0';
      c.style.transform = 'translateY(16px)';
    });
    secBooks.classList.add('hidden');
    secPaint.classList.add('hidden');

    setTimeout(() => {
      cards.forEach(c => {
        if (f === 'all' || c.dataset.cat === f) {
          c.classList.remove('hidden');
          visibleCards.push(c);
        }
      });

      const showBooks = f === 'all' || f === 'books';
      const showPaint = f === 'all' || f === 'paint';

      if (showBooks) secBooks.classList.remove('hidden');
      if (showPaint) secPaint.classList.remove('hidden');

      const visible = visibleCards.length + (showBooks ? 1 : 0) + (showPaint ? 1 : 0);
      empty.classList.toggle('show', visible === 0);

      animateIn(visibleCards, 0);

      if (showBooks) animateIn([secBooks], visibleCards.length * 55 + 20);
      if (showPaint) animateIn([secPaint], (visibleCards.length + (showBooks ? 1 : 0)) * 55 + 20);
    }, 30);

    tabs.forEach(t => t.classList.toggle('active', t.dataset.f === f));
    history.replaceState(null, '', f === 'all' ? location.pathname : '#' + f);
  }

  tabs.forEach(t => t.addEventListener('click', () => applyFilter(t.dataset.f)));

  const hash = location.hash.slice(1);
  applyFilter(hash || 'tools');
})();
