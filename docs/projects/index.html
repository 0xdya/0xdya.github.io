  <style>
    body {
      padding: 0 0 var(--space-7);
    }

    .tab[data-f="all"] {
      display: none !important;
    }

    h1 {
      font-size: var(--text-xl);
      font-weight: 400;
      color: var(--text);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: var(--text-xs);
      color: var(--muted);
      font-weight: 300;
      margin: var(--space-6) 0 var(--space-2);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      margin-bottom: var(--space-5);
    }

    .tab {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--space-3);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      font-size: var(--text-xs);
      font-family: "JetBrains Mono", monospace;
      cursor: pointer;
      transition: all .18s;
    }

    .tab:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, .15);
    }

    .tab.active {
      background: #e0e0e0;
      margin: 0 var(--space-2);
      color: #111;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color .2s, background .2s, opacity .35s ease, transform .35s ease;
      opacity: 0;
      transform: translateY(18px);
    }

    .card:hover {
      border-color: #111;
      background: var(--accent-dim);
    }

    .card.hidden {
      display: none;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .card-name {
      font-family: "JetBrains Mono", monospace;
      font-size: .92rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      position: absolute;
      right: var(--space-3);
      font-size: .68rem;
      color: var(--accent);
      border: none;
      padding: 1px 7px;
      border-radius: 4px;
      opacity: .8;
    }

    .card-desc {
      font-size: .84rem;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 8px;
      border-color: rgba(200, 181, 96, .03);
      color: var(--muted);
      font-size: .78rem;
      font-family: "JetBrains Mono", monospace;
      transition: all .18s;
      cursor: pointer;
    }

    .btn:hover {
      color: var(--text);
      border-color: rgba(255, 255, 255, .18);
      background: rgba(255, 255, 255, .07);
    }

    .btn.primary {
      border: 1px solid var(--border);
      color: var(--accent);
    }

    .btn.primary:hover {
      background: var(--accent-dim);
    }

    .section-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .4s ease, transform .4s ease;
    }

    .section-wrap.hidden {
      display: none;
    }

    .paint-grid {
      columns: 2;
      column-gap: 10px;
    }

    .paint-item {
      break-inside: avoid;
      margin-bottom: 10px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: border-color .25s, transform .2s;
    }

    .paint-item:hover {
      border-color: rgba(200, 181, 96, .3);
      transform: translateY(-2px);
    }

    .paint-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform .35s;
    }

    .paint-item .caption {
      display: none;
    }

    .books-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .book {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform .2s;
      max-width: 120px;
    }

    .book:hover {
      transform: translateY(-4px);
    }

    .book-cover {
      width: 110px;
      height: 150px;
      border-radius: 3px 9px 9px 3px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 4px 6px 18px rgba(0, 0, 0, .5), -2px 0 0 rgba(255, 255, 255, .05);
      background: rgba(255, 255, 255, .04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .book-label {
      font-size: .75rem;
      color: var(--muted);
      font-family: "JetBrains Mono", monospace;
      text-align: center;
      line-height: 1.4;
    }

    .sec-title {
      font-size: .75rem;
      color: var(--dim);
      font-family: "JetBrains Mono", monospace;
      text-transform: uppercase;
      letter-spacing: .1em;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--dim);
      font-family: "JetBrains Mono", monospace;
      font-size: .85rem;
      display: none;
    }

    .empty.show {
      display: block;
    }

    @media (min-width: 600px) {
      .paint-grid {
        columns: 3;
      }
    }

    .image-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeIn .2s ease;
    }

    .image-modal.active {
      display: flex;
    }

    .close-modal {
      position: absolute;
      top: 30px;
      right: 40px;
      font-size: 40px;
      color: white;
      cursor: pointer;
      user-select: none;
    }

    .modal-content {
      max-width: 90%;
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
      animation: zoomIn .2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      from { transform: scale(.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .assistant-popup {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: min(680px, calc(100vw - 0px));
      pointer-events: none;
      z-index: 9999;
    }

    .assistant-popup img {
      position: absolute;
      right: -2rem;
      top: 16rem;
      width: 160px;
      image-rendering: pixelated;
      animation: slideIn .6s ease;
      z-index: 999;
    }

    .bubble {
      position: absolute;
      right: 98px;
      top: 10.8rem;
      width: 280px;
      background: #111;
      border: 1px solid #222;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      border-bottom-left-radius: 16px;
      padding: 1rem;
      pointer-events: auto;
      animation: slideIn 1.6s ease;
    }

    .skin_btn,
    .skin_btn_close {
      display: inline-block;
      margin-top: .75rem;
      padding: .25rem 1rem;
      text-decoration: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s ease;
    }
    .skin_btn:hover,
    .skin_btn_close:hover {
      padding: .25rem 1.2rem;
    }

    .skin_btn {
      background: white;
      color: black;
    }

    .skin_btn_close {
      border: 1px solid #222;
      background: transparent;
      color: var(--text);
    }

    @keyframes slideIn {
      from {
        transform: translateX(150px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .blur {
      display: none;
      position: fixed;
      top: 0;
      height: 100vh;
      width: 100vw;
      z-index: 99;
      backdrop-filter: blur(12px);
      transition: .3s;
    }

    body.popup-open .blur {
      display: block;
    }
  </style>

</head>
