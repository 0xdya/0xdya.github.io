<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - الصفحة غير موجودة</title>

<style>
:root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #262626;
    --text: #fafafa;
    --muted: #888888;
    --accent: #ffffff;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: Inter, system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
}

.container {
    max-width: 500px;
    width: 100%;
    text-align: center;
}

.code {
    font-size: clamp(5rem, 15vw, 8rem);
    font-weight: 800;
    letter-spacing: -6px;
    line-height: 1;
    margin-bottom: 20px;
}

.divider {
    width: 60px;
    height: 1px;
    background: var(--border);
    margin: 24px auto;
}

h1 {
    font-size: 1.4rem;
    margin-bottom: 10px;
}

p {
    color: var(--muted);
    line-height: 1.7;
    margin-bottom: 32px;
}

.actions {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

.btn {
    text-decoration: none;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 10px;
    transition: 0.2s;
    font-size: 14px;
}

.btn:hover {
    border-color: #444;
    transform: translateY(-1px);
}

.btn.primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
}

.footer {
    position: fixed;
    bottom: 1rem;
    right: 50%;
    transform: translateX(50%);
    margin-top: 40px;
    color: #555;
    font-size: 13px;
}
</style>
</head>
<body>

<div class="container">

    <div class="code">404</div>

    <div class="divider"></div>

    <h1>الصفحة غير موجودة</h1>

    <p>
        يبدو أن الرابط الذي تحاول الوصول إليه غير موجود،
        أو ربما تم نقله أو حذفه.
    </p>

    <div class="actions">
        <a href="/" class="btn primary">العودة للرئيسية</a>
        <a href="https://0xdya.vercel.app/report/" class="btn">الإبلاغ عن الخلل</a>
    </div>

    <div class="footer">
        صنع بواسطة 0xdya
    </div>

</div>

</body>
</html>
