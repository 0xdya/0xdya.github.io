        /* Alert */
        #alertBox {
            display: block !important;

  position: fixed;
  top: 2rem;
  z-index: 99998; 
  right: 50%;
  transform: translateX(50%);
  font-size: var(--text-lg);
  border-radius: 16px;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;

}
#alertBox div {
    padding: 10px 14px; /*

}
.alert-success {
            border-radius: 16px;
            background: rgba(80, 200, 120, 0.08);
            border: 1px solid rgba(80, 200, 120, 0.2);
            color: #5ec87a;
            backdrop-filter: blur(12px);
        }
        
        .alert-error {
    border-radius: 16px;
  display: block;
  background: rgba(220, 80, 80, 0.08);

}
        #write_comment {
            font-size: var(--text-md);
            color: var(--muted);
            font-weight: 300;
            border-right: 4px solid rebeccapurple;
            padding: var(--space-1) var(--space-2);
            /* margin: var(--space-6) 0 var(--space-2); */
            /* color: var(--text-secondary); */
        }
        #write_comment a {
            color: var(--accent);
            /* font-weight: 600; */
        }

        .comment-form {
            background: #080808;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .4);
        }
        .composer-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .composer-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--surface-hover);
            flex-shrink: 0;
            object-fit: cover;
        }
        .composer-input-wrap {
            flex: 1;
        }
        .comment-form textarea {
            width: 100%;
            background: var(--input-bg);
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            min-height: 40px;
            max-height: 200px;
            outline: none;
            transition: border-radius 0.2s;
            line-height: 1.5;
        }
        .comment-form textarea:focus {
            border-radius: 12px;
        }
        .comment-form textarea::placeholder {
            color: var(--text-secondary);
        }
        .composer-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 8px;
            gap: 8px;
        }
        .comment-form button[type="submit"] {
            padding: 8px 18px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .comment-form button[type="submit"]:hover {
            background: var(--accent-hover);
        }

        #load {
            display: block;
            margin: 32px auto;
            opacity: .5;
        }

        .section-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .comment-card {
            display: flex;
            /* gap: 8px; */
            /* margin-bottom: 16px; */
            animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comment-avatar {
            flex-shrink: 0;
            position: relative;
        }
        .comment-avatar img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .comment-body {
            flex: 1;
            min-width: 0;
        }

        .comment-bubble {
            /* background: transparent; */
            /* border-radius: 18px; */
            padding: 10px 14px 0;
            display: inline-block;
            max-width: 100%;
            position: relative;
            box-shadow: 0 1px 1px rgba(0, 0, 0, .3);
        }
        .bubble-text {
            /* background: red; */
            background: var(--accent-dim);
            border: 1px #222 solid;
            border-radius: 18px 0 18px 18px;
            padding: 8px 12px;
            font-size: var(--text-md);
            color: var(--text);
            
        }
        .comment-bubble.pinned {
            /* border-right: 3px solid #c8b560; */
            border-radius: 18px 4px 4px 18px;
        }
        .bubble-author {
            font-size: var(--text-md);
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 2px;
            vertical-align: middle;
        }
        .bubble-author svg,
        .bubble-author img {
            margin-top: -1px;
            width: var(--space-3);
            height: var(--space-3);
        }
        .bubble-author svg {
            fill: var(--accent);
        }
        .badge-owner {
            width: 16px !important;
            height: 16px !important;
        }


        .pin-badge {
            font-size: var(--text-xs);
            color: #c8b560;
            display: flex;
            align-items: center;
            gap: 3px;
            /* margin-bottom: 4px; */
        }

        .comment-meta {
            display: flex;
            align-items: center;
            gap: 4px;
            /* padding: 4px  0; */
            margin: 1rem 0 0;
        }
        .meta-action {
            font-weight: 600;
            cursor: pointer;
            transition: color 0.15s;
            color: var(--text-secondary);
            font-size: var(--text-sm);
                /* color: #9b87f5; */
    padding: 0 var(--space-2);

    border-radius: 4px;
    background: rgb(255 255 255 / .02);
    backdrop-filter: blur(6px);
    transition: border-color .2s, background .2s
        }
        .meta-action:hover {

            color: #e05c5c;

        .replies-section {
            margin-bottom: 16px;

        .reply-toggle-btn {
            border-radius: 4px 4px 12px 4px;

        .reply-card {
            display: flex;
            gap: 8px;
            /* margin-bottom: 8px; */
            animation: fadeUp 0.2s ease;
            
        }
        .reply-card img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
            flex-shrink: 0;
            margin-top: 2px;
        }
        .reply-bubble {
            width: fit-content;
                        background: var(--accent-dim);
            border: 1px #222 solid;
            border-radius: 18px 0 18px 18px;
            padding: 8px 12px;
            font-size: var(--text-md);
            color: var(--text);

        .reply-author {

            gap: 4px;
            margin-bottom: 2px;

        .reply-author svg {
            width: 12px;
            height: 12px;
            fill: var(--accent);
        }
        .reply-text {
            font-size: 0.875rem;
            color: var(--text);
            word-break: break-word;
        }
        .reply-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 3px 4px 0;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .reply-meta button {
            font-weight: 600;
            cursor: pointer;
            transition: color 0.15s;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.78rem;
            padding: 0;
        }
        .reply-meta button:hover {
            color: #e05c5c;
            text-decoration: underline;
        }

        /* Reply form */
        .reply-form-wrap {
            display: none;
            margin-top: 8px;
            margin-left: 48px;
            gap: 8px;
            align-items: flex-start;
        }
        .reply-form-wrap.open {

        }
        .reply-form-wrap img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
            flex-shrink: 0;
            margin-top: 4px;
        }
        .reply-input-row {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .reply-input-row textarea {
            flex: 1;
            background: var(--input-bg);
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: var(--text-sm);
            min-height: 36px;
            outline: none;
        }
        .reply-input-row textarea::placeholder {
            color: var(--text-secondary);
        }
        .reply-input-row button {
            padding: 7px 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .reply-input-row button:hover {
            background: var(--accent-hover);
        }
