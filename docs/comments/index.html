<html lang="en" dir="ltr">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <link rel="stylesheet" href="../css/static.css">
        <script type="module" src="../js/user.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

        <style>:root
        {

            --surface: #0e0e0e;
            --surface-hover: #3a3b3c;
            --input-bg: #3a3b3c;
            --text: #e4e6eb;
            --text-secondary: #b0b3b8;
            --accent: #2d88ff;
            --accent-hover: #4599ff;
            /* --border: #3e4042; */
            --online: #31a24c;
            --reaction-bg: #242526;
        }


        body {
            padding-bottom: var(--space-6);
        }

        a {
            text-decoration: none;
            color: inherit;
        }


        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            gap: 12px;
            /* margin-bottom: 20px; */
            /* padding-bottom: 16px;
      border-bottom: 1px solid var(--border); */
        }
        .page-header h1 {
            font-size: var(--text-xl);
            font-weight: 400;
            color: var(--text);
            /* margin-bottom: var(--space-8); */
        }
        /* Alert */
        #alertBox {
            margin-bottom: 12px;
            font-size: 0.85rem;
        }
        #alertBox div {
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--surface);
            border-left: 3px solid var(--accent);
        }

        #write_comment {
            font-size: var(--text-xs);
            color: var(--muted);
            font-weight: 300;
            margin: var(--space-6) 0 var(--space-2);
            /* color: var(--text-secondary); */
        }
        #write_comment a {
            color: var(--accent);
            /* font-weight: 600; */
        }

        .comment-form {
            background: var(--surface);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, .4);
        }
        .composer-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .composer-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--surface-hover);
            flex-shrink: 0;
            object-fit: cover;
        }
        .composer-input-wrap {
            flex: 1;
        }
        .comment-form textarea {
            width: 100%;
            background: var(--input-bg);
            border: none;
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            min-height: 40px;
            max-height: 200px;
            outline: none;
            transition: border-radius 0.2s;
            line-height: 1.5;
        }
        .comment-form textarea:focus {
            border-radius: 12px;
        }
        .comment-form textarea::placeholder {
            color: var(--text-secondary);
        }
        .composer-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: 8px;
            gap: 8px;
        }
        .comment-form button[type="submit"] {
            padding: 8px 18px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .comment-form button[type="submit"]:hover {
            background: var(--accent-hover);
        }

        #load {
            display: block;
            margin: 32px auto;
            opacity: .5;
        }

        .section-label {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .comment-card {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            animation: fadeUp 0.25s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .comment-avatar {
            flex-shrink: 0;
            position: relative;
        }
        .comment-avatar img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border);
        }

        .comment-body {
            flex: 1;
            min-width: 0;
        }

        .comment-bubble {
            background: var(--surface);
            border-radius: 18px;
            padding: 10px 14px;
            display: inline-block;
            max-width: 100%;
            position: relative;
            box-shadow: 0 1px 1px rgba(0, 0, 0, .3);
        }
        .comment-bubble.pinned {
            border-left: 3px solid #c8b560;
            border-radius: 4px 18px 18px 4px;
        }
        .bubble-author {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 2px;
        }
        .bubble-author svg,
        .bubble-author img {
            width: 14px;
            height: 14px;
        }
        .bubble-author svg {
            fill: var(--accent);
        }
        .badge-owner {
            width: 16px !important;
            height: 16px !important;
        }

        .bubble-text {
            font-size: 0.9375rem;
            color: var(--text);
            word-break: break-word;
            white-space: pre-wrap;
        }

        .pin-badge {
            font-size: 0.75rem;
            color: #c8b560;
            display: flex;
            align-items: center;
            gap: 3px;
            margin-bottom: 4px;
        }

        .comment-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 4px 14px 0;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .meta-time {}
        .meta-action {
            font-weight: 600;
            cursor: pointer;
            transition: color 0.15s;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            padding: 0;
        }
        .meta-action:hover {
            color: var(--text);
            text-decoration: underline;
        }
        .meta-action.delete:hover {
            color: #e05c5c;
        }

        /* Replies */
        .replies-section {
            margin-top: 6px;
            margin-left: 48px;
            display: block;
        }
        .reply-card {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            animation: fadeUp 0.2s ease;
        }
        .reply-card img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
            flex-shrink: 0;
            margin-top: 2px;
        }
        .reply-bubble {
            /* background: var(--surface); */
            border-radius: 14px;
            padding: 8px 12px;
            display: inline-block;
            max-width: 100%;
            box-shadow: 0 1px 1px rgba(0, 0, 0, .3);
        }
        .reply-author {
            font-size: 0.825rem;
            font-weight: 600;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 2px;
        }
        .reply-author svg {
            width: 12px;
            height: 12px;
            fill: var(--accent);
        }
        .reply-text {
            font-size: 0.875rem;
            color: var(--text);
            word-break: break-word;
        }
        .reply-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 3px 4px 0;
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .reply-meta button {
            font-weight: 600;
            cursor: pointer;
            transition: color 0.15s;
            color: var(--text-secondary);
            background: none;
            border: none;
            font-family: inherit;
            font-size: 0.78rem;
            padding: 0;
        }
        .reply-meta button:hover {
            color: #e05c5c;
            text-decoration: underline;
        }

        /* Reply form */
        .reply-form-wrap {
            display: none;
            margin-top: 8px;
            margin-left: 48px;
            gap: 8px;
            align-items: flex-start;
        }
        .reply-form-wrap.open {
            display: flex;
        }
        .reply-form-wrap img {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border);
            flex-shrink: 0;
            margin-top: 4px;
        }
        .reply-input-row {
            flex: 1;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .reply-input-row textarea {
            flex: 1;
            background: var(--input-bg);
            border: none;
            border-radius: 20px;
            padding: 8px 14px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.875rem;
            resize: none;
            min-height: 36px;
            outline: none;
        }
        .reply-input-row textarea::placeholder {
            color: var(--text-secondary);
        }
        .reply-input-row button {
            padding: 7px 14px;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .reply-input-row button:hover {
            background: var(--accent-hover);
        }

    </style>
</head>
