      margin-bottom: var(--space-3);
    }
    
    .form-section {
      position: relative;
      margin-bottom: var(--space-7);
      img{
        position: absolute;
        right: 0;
        top: -6.25rem;
        width: 140px;
      }
    }
    
    .form-group {
      margin-bottom: var(--space-3);
    }
    
    
    input,
    textarea {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: var(--space-3) var(--space-4);
      color: var(--text);
      font-family: "JetBrains Mono", monospace;
      font-size: var(--text-sm);
      outline: none;
      transition: border-color .2s, background .2s;
      resize: none;
    }
    
    input:focus,
    textarea:focus {
      border-color:  var( --border-hover);
      background: var(--accent-dim);
    }
    
    input::placeholder,
    textarea::placeholder {
      color: var(--dim);
    }
    
    textarea {
      min-height: 130px;
    }
    
    .send-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      background: var(--accent-dim);
      border: 1px solid var( --border);
      border-radius: 10px;
      padding: var(--space-3) var(--space-5);
      color: var(--accent);
      font-family: "JetBrains Mono", monospace;
      font-size: var(--text-sm);
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .15s;
    }
    
    .send-btn:hover {
      background: rgba(200, 181, 96, .2);
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }
    
    .send-btn:active {
      transform: translateY(0);
    }
    
    .send-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
    }
    
    .status {
      margin-top: var(--space-3);
      font-size: var(--text-xs);
      padding: var(--space-2) var(--space-4);
      border-radius: 8px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: rgba(80, 200, 120, .08);
      border: 1px solid rgba(80, 200, 120, .2);
      color: #5ec87a;
    }
    
    .status.error {
      display: block;
      background: rgba(220, 80, 80, .08);
      border: 1px solid rgba(220, 80, 80, .2);
      color: #e06060;
    }
    
    .socials {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }
    
    .social-link {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: var(--text-sm);
      transition: all .2s;
    }
    
    .social-link:hover {
      border-color: var( --border-hover);
      background: var(--accent-dim);
      color: var(--accent);
      margin: 0 var(--space-2);
    }
    
    .social-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

  <script>

    async function sendMessage() {
      const name = document.getElementById("name").value.trim();
      const message = document.getElementById("message").value.trim();
      const btn = document.getElementById("sendBtn");

      if (!message) { showStatus("write a message first.", "error"); return; }

      btn.disabled = true;
      btn.textContent = "sending...";

      const text = `📩 new message from your site\n\n👤 name: ${name || "anonymous"}\n\n💬 message:\n${message}`;

      try {
    const res = await fetch('/api/contact', {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, message })
    });

        // const data = await res.json();

        if (res.ok) {
      showStatus("✓ message sent successfully.", "success");
      document.getElementById("name").value = "";
      document.getElementById("message").value = "";
    } else {
      showStatus("error — something went wrong.", "error");
    }
  } catch {
    showStatus("connection failed.", "error");
  }

      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> send`;
    }

    function showStatus(msg, type) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "status " + type;
      setTimeout(() => { el.className = "status"; }, 4000);
    }
  </script>
