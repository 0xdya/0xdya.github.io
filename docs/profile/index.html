<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile | 0xdya</title>
  <link rel="stylesheet" href="../css/static.css"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    :root {
      --bg:        #000;
      --surface:   #0f0f0f;
      --surface2:  #161616;
      --surface3:  #1d1d1d;
      --border:    #2f2f2f;
      --border2:   #1f1f1f;
      --accent:    #fff;
      --accent-btn:#efefef;
      --blue:      #1d9bf0;
      --green:     #00ba7c;
      --text:      #e7e9ea;
      --muted:     #71767b;
      --dim:       #404040;
      --danger:    #f4212e;
      --r:         16px;
      --rs:        8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }

    body {
      /* display: flex;
      justify-content: center;
      align-items: center; */
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      margin: 0 auto;
      min-height: 100dvh;
      max-width: 600px;
    }
    main{
      min-height: 100dvh;
  border: 1px solid var(--border2); 
}

    #loading {
      display: flex; justify-content: center;
      align-items: center; height: 100vh;
    }
    #msgBox {
      display: none; text-align: center;
      padding: 80px 20px; font-size: 15px; color: var(--muted);
    }
    #profileContainer { display: none; }

    .banner-wrap {
      position: relative;
      height: 200px;
      background: var(--surface2);
      overflow: hidden;
    }
    .banner-wrap.owner { cursor: pointer; }
    #bannerImg {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: filter .2s;
    }
    .banner-wrap.owner:hover #bannerImg { filter: brightness(.7); }
    .banner-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; color: #fff; font-size: 14px;
      opacity: 0; transition: opacity .2s;
      background: rgba(0,0,0,.4);
    }
    .banner-wrap.owner:hover .banner-overlay { opacity: 1; }

    .avatar-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 0 16px;
      margin-top: -42px;
      position: relative;
      z-index: 2;
    }
    .avatar-wrap {
      width: 88px; height: 88px;
      border-radius: 50%;
      border: 4px solid var(--bg);
      background: var(--surface2);
      overflow: hidden;
      flex-shrink: 0;
    }
    .avatar-wrap.owner { cursor: pointer; }
    #photoPreview { width:100%; height:100%; object-fit:cover; display:block; }
    .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s;
    }
    .avatar-wrap { position: relative; }
    .avatar-wrap.owner:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay ion-icon { color:#fff; font-size:24px; }

    .avatar-actions { display: flex; gap: 8px; padding-bottom: 8px; }
    .btn-x {
      padding: 7px 16px;
      border-radius: 20px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      border: none;
      display: none;
      white-space: nowrap;
    }
    .btn-x-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-x-outline:hover { background: rgba(255,255,255,.07); }
    .btn-x-solid {
      background: var(--text);
      color: #000;
    }
    .btn-x-solid:hover { background: #d7d7d7; }
    .btn-x-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid #3a1419;
    }
    .btn-x-danger:hover { background: rgba(244,33,46,.1); }

    .profile-body { padding: 12px 16px 20px; }

    .name-row {
      vertical-align: middle;
      display: flex; align-items: center;
      gap: 6px; flex-wrap: wrap; margin-bottom: 2px;
    }
    .username {
      font-size: 20px; font-weight: 700;
      color: var(--accent); letter-spacing: -.3px;
    }

    .role-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; border-radius: 50%;
      font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .role-badge img      { width:14px; height:14px; }

    .handle {
      display: none;
      font-size: 14px; color: var(--muted);
      margin-bottom: 10px;
    }

    #displayBioInput {
      font-size: 15px; color: var(--text);
      line-height: 1.7; white-space: pre-wrap;
      word-break: break-word; margin-bottom: 12px;
    }

    .stats-row {
      display: flex; gap: 20px;
      margin: 12px 0;
       flex-wrap: wrap;
    }
    .stat-item, a {
      font-size: 14px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .stat-item .val { color: var(--text); font-weight: 700; }
    .stat-item ion-icon { font-size: 14px; }

    #statusEl {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; color: var(--muted);
    }
    .dot { width:8px; height:8px; border-radius:50%; background:var(--dim); }
    #statusEl.online .dot { background: var(--green); }
    #statusEl.online { color: var(--green); }

    .divider { height:1px; background:var(--border2); margin:16px 0; }

    .section-label {
      font-size: 11px; text-transform: uppercase;
      letter-spacing: 2px; color: var(--muted); margin-bottom: 12px;
    }

    .social-links { display:flex; flex-wrap:wrap; gap:8px; }
    .link_card {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; border: 1px solid var(--border);
      border-radius: 20px; background: transparent;
      font-size: 13px; color: var(--muted);
      text-decoration: none; transition: all .15s; cursor: pointer;
    }
    .link_card:hover { border-color:var(--blue); color:var(--blue); background:rgba(29,155,240,.07); }
    .link_card ion-icon { font-size: 14px; flex-shrink: 0; }
    .del-btn {
      background:none; border:none; color:var(--dim);
      cursor:pointer; font-size:12px; padding:0;
      margin-left:4px; line-height:1; transition:color .15s;
    }
    .del-btn:hover { color:var(--danger); }

    #edit_section {
      display:none; margin-top:16px;
      padding:16px; border-top:1px solid var(--border2);
      animation:fadeUp .2s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .edit-label {
      font-size:11px; text-transform:uppercase;
      letter-spacing:1.5px; color:var(--muted); margin:0 0 6px;
    }
    .edit-field {
      width:100%; padding:10px 14px; font-size:14px; font-family:inherit;
      border:1px solid var(--border); border-radius:var(--rs);
      background:var(--surface2); color:var(--text);
      outline:none; transition:border-color .15s;
      margin-bottom:14px; resize:vertical;
    }
    .edit-field:focus { border-color:var(--blue); }
    .edit-field::placeholder { color:var(--dim); }
    .social-add-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
    .social-add-row select, .social-add-row input {
      flex:1; min-width:90px; padding:9px 12px;
      font-size:13px; font-family:inherit;
      border:1px solid var(--border); border-radius:var(--rs);
      background:var(--surface2); color:var(--text); outline:none;
    }
    .social-add-row select:focus, .social-add-row input:focus { border-color:var(--blue); }
    .social-add-row select option { background:#111; }
    .btn-add { padding:9px 16px; background:var(--text); color:#000; border:none; border-radius:20px; font-family:inherit; font-size:13px; font-weight:700; cursor:pointer; }
    .btn-add:hover { background:#d7d7d7; }
    .btn-save-all {
      width:100%; padding:11px; background:var(--text); color:#000;
      border:none; border-radius:20px; font-family:inherit;
      font-size:14px; font-weight:700; cursor:pointer;
      transition:background .15s; margin-top:4px;
    }
    .btn-save-all:hover { background:#d7d7d7; }
    .btn-save-all:disabled { opacity:.5; cursor:not-allowed; }

    #syncPhotoBtn {
      width:100%; padding:9px; background:transparent; color:var(--muted);
      border:1px dashed var(--border); border-radius:var(--rs);
      font-family:inherit; font-size:12px; cursor:pointer;
      margin-bottom:14px; transition:all .15s;
    }
    #syncPhotoBtn:hover { border-color:var(--blue); color:var(--blue); }

    .upload-bar-wrap { display:none; height:3px; background:var(--surface3); border-radius:3px; overflow:hidden; margin-bottom:10px; }
    .upload-bar { height:100%; background:var(--blue); width:0%; transition:width .3s; }

    #bannerFileInput, #avatarFileInput { display:none; }

    .navbar_section {
      position:fixed; bottom:0; left:50%; transform:translateX(-50%);
      width:100%; max-width:600px; z-index:100;
    }
    #roleIcons{
      display: flex;
      gap: 8px;
    }
    hr{
      margin: 1rem 0;
    }
  </style>
</head>
<body>
<main>
  <div id="loading"><img width="40" src="../img/load.gif"/></div>
  <div id="msgBox"></div>
  <input type="file" id="bannerFileInput" accept="image/*"/>
  <input type="file" id="avatarFileInput" accept="image/*"/>
  
  <div id="profileContainer">
  
    <!-- Banner -->
    <div class="banner-wrap" id="bannerWrap">
      <img id="bannerImg" alt=""/>
      <div class="banner-overlay"><ion-icon name="camera-outline"></ion-icon> change banner</div>
    </div>
  
    <!-- Avatar row -->
    <div class="avatar-row">
      <div class="avatar-wrap" id="avatarWrap">
        <img id="photoPreview" src="../img/user.jpg" alt="avatar"/>
        <div class="avatar-overlay"><ion-icon name="camera-outline"></ion-icon></div>
      </div>
      <div class="avatar-actions">
        <button class="btn-x btn-x-outline" id="editBtn">Edit profile</button>
        <button class="btn-x btn-x-danger"  id="logoutBtn">Logout</button>
      </div>
    </div>
  
    <!-- Body -->
    <div class="profile-body">
  
      <div class="name-row">
        <span class="username" id="currentName"></span>
        <div id="roleIcons"></div>
      </div>
      <div id="statusEl"><span class="dot"></span><span id="statusText">—</span></div>
      <div class="handle" id="handleEl"></div>
  
  
      <div id="displayBioInput"></div>
  
      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-item" id="statJoined">
          <ion-icon name="calendar-outline"></ion-icon>
          <span>joined <span class="val">—</span></span>
        </div>
        <div class="stat-item" id="statComments">
          <ion-icon name="chatbubble-outline"></ion-icon>
          <p>comments: <span class="val">—</span></p>
        </div>
      </div>
  <hr>
      <!-- Socials -->
      <div id="socialLinks" class="social-links"></div>
  
      <!-- Edit panel -->
      <div id="edit_section">
        <button id="syncPhotoBtn">🔄 sync avatar from Google</button>
        <div class="upload-bar-wrap" id="uploadBarWrap">
          <div class="upload-bar" id="uploadBar"></div>
        </div>
  
        <p class="edit-label">username</p>
        <input type="text" id="displayNameInput" class="edit-field" placeholder="new username"/>
  
        <p class="edit-label">bio</p>
        <textarea id="bioInput" class="edit-field" rows="3" placeholder="write something..."></textarea>
  
        <p class="edit-label">add social link</p>
        <div class="social-add-row">
          <select id="platformSelect">
            <option value="twitter">Twitter / X</option>
            <option value="instagram">Instagram</option>
            <option value="facebook">Facebook</option>
            <option value="github">GitHub</option>
            <option value="youtube">YouTube</option>
            <option value="linkedin">LinkedIn</option>
            <option value="email">Email</option>
          </select>
          <input type="text" id="socialUsernameInput" placeholder="username"/>
          <button class="btn-add" id="saveSocialBtn">add</button>
        </div>
  
        <button class="btn-save-all" id="saveAllBtn">Save changes</button>
      </div>
  
    </div>
  </div>
</main>

<script type="module">
  import { initializeApp }  from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
  import {
    getFirestore, collection, query, where, getDocs,
    doc, getDoc, setDoc, onSnapshot
  } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
  import {
    getAuth, onAuthStateChanged, signOut, updateProfile
  } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
  import {
    getStorage, ref as sRef, uploadBytesResumable, getDownloadURL
  } from "https://www.gstatic.com/firebasejs/11.9.1/firebase-storage.js";

  const cfg = {
    apiKey: "AIzaSyC2U0aM8mUrYoDI0R9pYbzQZk1g9zd96O0",
    authDomain: "oxdyaa.firebaseapp.com",
    projectId: "oxdyaa",
    storageBucket: "oxdyaa.appspot.com",
    messagingSenderId: "604062703590",
    appId: "1:604062703590:web:924c0cbd8a988f4fcf8027"
  };

  const app     = initializeApp(cfg);
  const auth    = getAuth(app);
  const db      = getFirestore(app);
  const storage = getStorage(app);

  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

  const urlParams       = new URLSearchParams(window.location.search);
  const usernameFromURL = urlParams.get("user") || "profile";

  const $ = id => document.getElementById(id);
  const loadingEl        = $("loading");
  const profileEl        = $("profileContainer");
  const msgBox           = $("msgBox");
  const currentNameEl    = $("currentName");
  const roleIconsEl      = $("roleIcons");
  const handleEl         = $("handleEl");
  const photoPreview     = $("photoPreview");
  const bannerImg        = $("bannerImg");
  const bannerWrap       = $("bannerWrap");
  const avatarWrap       = $("avatarWrap");
  const displayBioEl     = $("displayBioInput");
  const statusEl         = $("statusEl");
  const statusText       = $("statusText");
  const statJoined       = $("statJoined");
  const statComments     = $("statComments");
  const editBtn          = $("editBtn");
  const logoutBtn        = $("logoutBtn");
  const edit_section     = $("edit_section");
  const displayNameInput = $("displayNameInput");
  const bioInput         = $("bioInput");
  const saveAllBtn       = $("saveAllBtn");
  const syncPhotoBtn     = $("syncPhotoBtn");
  const platformSelect   = $("platformSelect");
  const socialInput      = $("socialUsernameInput");
  const saveSocialBtn    = $("saveSocialBtn");
  const socialLinksDiv   = $("socialLinks");
  const bannerFile       = $("bannerFileInput");
  const avatarFile       = $("avatarFileInput");
  const uploadBarWrap    = $("uploadBarWrap");
  const uploadBar        = $("uploadBar");

  const showMessage = msg => {
    loadingEl.style.display = "none";
    msgBox.style.display    = "block";
    msgBox.innerHTML        = msg;
  };
  const showProfile = () => {
    loadingEl.style.display = "none";
    profileEl.style.display = "block";
  };
  const timeAgo = sec => {
    if (sec < 3600)  return `${Math.floor(sec/60)}m ago`;
    if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
    return `${Math.floor(sec/86400)}d ago`;
  };
  const normSocials = raw => {
    if (Array.isArray(raw)) return raw;
    if (raw && typeof raw === "object")
      return Object.entries(raw).filter(([,v])=>v).map(([p,u])=>({platform:p,username:u}));
    return [];
  };
  const socialURL = (p,u) => ({
    twitter:`https://x.com/${u}`, x:`https://x.com/${u}`,
    github:`https://github.com/${u}`, linkedin:`https://linkedin.com/in/${u}`,
    facebook:`https://facebook.com/${u}`, instagram:`https://instagram.com/${u}`,
    youtube:`https://youtube.com/@${u}`, email:`mailto:${u}`
  }[p] || "#");
  const socialIcon = p => ({
    twitter:"logo-twitter", x:"logo-twitter", github:"logo-github",
    linkedin:"logo-linkedin", facebook:"logo-facebook",
    instagram:"logo-instagram", youtube:"logo-youtube", email:"mail-outline"
  }[p] || "link-outline");

  function getRoleBadges(data) {
    let html = "";
    if (data.verified)
      html += `<img src="https://0xdya.vercel.app/badges/verf.svg" class="role-badge">`;
    if (data.role === "owner")
      html += `<img src="https://0xdya.vercel.app/badges/server-owner.svg" class="role-badge">`;
    if (data.role === "QA-tester")
      html += `<img src="https://0xdya.vercel.app/badges/bug-hunter-lv1.svg" class="role-badge">`;

    return html;
  }

  function applyNavUI(photo, name) {
    const c = $("userPhotoContainer"); if (!c) return;
    c.innerHTML = (name||photo)
      ? `<a class="user_photo_href nav-item" href="?user=${encodeURIComponent(name||'')}"><img src="${photo||'../img/user.jpg'}"></a>`
      : `<a href="../login/" class="nav-item">
           <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
             <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
           </svg><span class="nav-text">Account</span></a>`;
  }
  const _c = localStorage.getItem("userData");
  if (_c) { const d=JSON.parse(_c); applyNavUI(d.photo,d.name); }

  displayNameInput.addEventListener("input", () => {
    displayNameInput.value = displayNameInput.value
      .replace(/\s+/g,"_").replace(/[^\u0621-\u064A\u0660-\u0669a-zA-Z0-9_]/g,"");
  });

  function uploadImage(file, path) {
    return new Promise((resolve, reject) => {
      const task = uploadBytesResumable(sRef(storage, path), file);
      uploadBarWrap.style.display = "block";
      task.on("state_changed",
        s => { uploadBar.style.width = (s.bytesTransferred/s.totalBytes*100)+"%"; },
        e => { uploadBarWrap.style.display="none"; reject(e); },
        async () => {
          const url = await getDownloadURL(task.snapshot.ref);
          uploadBarWrap.style.display="none"; uploadBar.style.width="0%";
          resolve(url);
        }
      );
    });
  }

  onAuthStateChanged(auth, async user => {
    applyNavUI(user?.photoURL, user?.displayName);
    try {
      if (!user && usernameFromURL === "profile") {
        showMessage(`⚠️ please <a href='../login/' style='color:#1d9bf0'>login</a> first.`);
        return;
      }
      if (user && usernameFromURL === "profile") {
        const snap = await getDoc(doc(db,"users",user.uid));
        if (snap.exists() && snap.data().name) {
          window.location.replace(`?user=${encodeURIComponent(snap.data().name)}`);
          return;
        }
        showMessage(`⚠️ profile not set up. <a href='../login/' style='color:#1d9bf0'>go to login</a>`);
        return;
      }
      loadProfile(user);
    } catch(e) {
      console.error(e);
      showMessage("🚨 something went wrong.");
    }
  });

  function loadProfile(currentUser) {
    const q = query(collection(db,"users"), where("name","==",usernameFromURL));
    onSnapshot(q, async qs => {
      if (qs.empty) { showMessage("🚫 user not found."); return; }

      const userDoc = qs.docs[0];
      const data    = userDoc.data();
      const uid     = userDoc.id;
      const isOwner = !!(currentUser && currentUser.uid === uid);

      currentNameEl.textContent = data.name || "";
      handleEl.textContent      = `@${data.name || ""}`;
      displayBioEl.textContent  = data.bio  || "";

      if (data.banner) bannerImg.src = data.banner;
      photoPreview.src = isOwner
        ? (currentUser.photoURL || data.photo || "../img/user.jpg")
        : (data.photo || "../img/user.jpg");

      showProfile();

      roleIconsEl.innerHTML = getRoleBadges(data);

      if (data.lastLogin?.toDate) {
        const diff = Math.floor((Date.now() - data.lastLogin.toDate()) / 1000);
        statusEl.className     = diff < 300 ? "online" : "";
        statusText.textContent = diff < 300 ? "online now" : `last seen ${timeAgo(diff)}`;
      }

      const created = data.createdAt?.toDate?.();
      if (created) {
        statJoined.innerHTML = `
          <ion-icon name="calendar-outline"></ion-icon>
          <span>Joined <span class="val">${MONTHS[created.getMonth()]} ${created.getFullYear()}</span></span>`;
      }

      getDocs(query(collection(db,"comments"), where("uid","==",uid)))
        .then(snap => {
          statComments.innerHTML = `
            <a href="../comments/"><ion-icon name="chatbubble-outline"></ion-icon>
            <span>comments: <span class="val">${snap.size}</span> </span> </a>`;
        })
        .catch(e => console.error("comments count:", e));

      let userSocials = normSocials(data.socials);
      let sortable    = null;
      let isEditing   = false;

      function renderSocials() {
        socialLinksDiv.innerHTML = "";
        userSocials.forEach(({platform,username},i) => {
          const card = document.createElement("div");
          card.className = "link_card";
          card.setAttribute("draggable", String(isOwner));
          card.innerHTML = `
            <ion-icon name="${socialIcon(platform)}"></ion-icon>
            <a href="${socialURL(platform,username)}" target="_blank" rel="noopener"
               style="color:inherit;text-decoration:none">${username}</a>
            ${isOwner ? `<button class="del-btn" title="remove">✕</button>` : ""}`;
          if (isOwner) {
            card.querySelector(".del-btn").onclick = async e => {
              e.stopPropagation();
              userSocials.splice(i,1);
              await setDoc(doc(db,"users",uid),{socials:userSocials},{merge:true});
              renderSocials(); if(isEditing) enableSorting();
            };
          }
          socialLinksDiv.appendChild(card);
        });
      }

      function enableSorting() {
        if (sortable) sortable.destroy();
        sortable = new Sortable(socialLinksDiv, {
          animation:150, draggable:".link_card",
          onEnd: async ({oldIndex,newIndex}) => {
            if (oldIndex===newIndex) return;
            const [m] = userSocials.splice(oldIndex,1);
            userSocials.splice(newIndex,0,m);
            await setDoc(doc(db,"users",uid),{socials:userSocials},{merge:true});
            renderSocials(); enableSorting();
          }
        });
      }

      renderSocials();
      if (!isOwner) return;

      editBtn.style.display   = "flex";
      logoutBtn.style.display = "flex";
      bannerWrap.classList.add("owner");
      avatarWrap.classList.add("owner");

      bannerWrap.addEventListener("click", () => { if(isEditing) bannerFile.click(); });
      avatarWrap.addEventListener("click", () => { if(isEditing) avatarFile.click(); });

      bannerFile.addEventListener("change", async () => {
        const file = bannerFile.files[0]; if(!file) return;
        if(file.size > 5*1024*1024) { alert("❌ max 5MB"); return; }
        try {
          saveAllBtn.disabled=true;
          const url = await uploadImage(file,`banners/${uid}`);
          await setDoc(doc(db,"users",uid),{banner:url},{merge:true});
          bannerImg.src=url; saveAllBtn.disabled=false;
          alert("✅ banner updated!");
        } catch(e) { saveAllBtn.disabled=false; alert("❌ "+e.code); }
      });

      avatarFile.addEventListener("change", async () => {
        const file = avatarFile.files[0]; if(!file) return;
        if(file.size > 3*1024*1024) { alert("❌ max 3MB"); return; }
        try {
          saveAllBtn.disabled=true;
          const url = await uploadImage(file,`avatars/${uid}`);
          await updateProfile(currentUser,{photoURL:url});
          await setDoc(doc(db,"users",uid),{photo:url},{merge:true});
          photoPreview.src=url; saveAllBtn.disabled=false;
          alert("✅ avatar updated!");
        } catch(e) { saveAllBtn.disabled=false; alert("❌ "+e.code); }
      });

      editBtn.addEventListener("click", () => {
        isEditing = !isEditing;
        edit_section.style.display = isEditing ? "block" : "none";
        editBtn.textContent        = isEditing ? "✕ Close" : "Edit profile";
        displayNameInput.value     = data.name || "";
        bioInput.value             = data.bio  || "";
        if(isEditing) enableSorting();
        else { if(sortable){sortable.destroy();sortable=null;} }
        renderSocials();
      });

      syncPhotoBtn.addEventListener("click", async () => {
        try {
          await currentUser.reload();
          const gp = currentUser.providerData.find(p=>p.providerId==="google.com");
          if(!gp?.photoURL) { alert("❌ no Google photo."); return; }
          await updateProfile(currentUser,{photoURL:gp.photoURL});
          await setDoc(doc(db,"users",uid),{photo:gp.photoURL},{merge:true});
          photoPreview.src=gp.photoURL; alert("✅ synced!");
        } catch(e) { alert("❌ "+e.code); }
      });

      saveAllBtn.addEventListener("click", async () => {
        const newName = displayNameInput.value.trim();
        const newBio  = bioInput.value.trim().slice(0,200);
        if(!newName) { alert("⚠️ username cannot be empty."); return; }
        if(newName !== data.name) {
          const chk = await getDocs(query(collection(db,"users"),where("name","==",newName)));
          if(!chk.empty && chk.docs[0].id!==currentUser.uid) { alert("⚠️ username taken."); return; }
        }
        try {
          saveAllBtn.disabled=true; saveAllBtn.textContent="Saving...";
          await updateProfile(currentUser,{displayName:newName});
          await setDoc(doc(db,"users",uid),{
            name:newName, bio:newBio,
            photo:currentUser.photoURL||data.photo,
            socials:userSocials
          },{merge:true});
          alert("✅ saved!");
          window.location.href=`?user=${encodeURIComponent(newName)}`;
        } catch(e) {
          saveAllBtn.disabled=false; saveAllBtn.textContent="Save changes";
          alert("❌ "+e.code);
        }
      });

      saveSocialBtn.addEventListener("click", async () => {
        const platform = platformSelect.value;
        const username = socialInput.value.trim().replace(/^@/,"");
        if(!username) { alert("⚠️ enter a username."); return; }
        if(userSocials.find(s=>s.platform===platform&&s.username===username)) { alert("⚠️ already added."); return; }
        userSocials.push({platform,username});
        await setDoc(doc(db,"users",uid),{socials:userSocials},{merge:true});
        socialInput.value=""; renderSocials(); if(isEditing) enableSorting();
      });

      logoutBtn.addEventListener("click", async () => {
        try { await signOut(auth); window.location.href="../"; }
        catch(e) { console.error(e); }
      });
    });
  }
</script>
</body>
</html>
