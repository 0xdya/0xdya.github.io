<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile | 0xdya</title>
  <link rel="stylesheet" href="../css/static.css" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;0,700;1,400&display=swap"
    rel="stylesheet" />
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script type="module" src="../js/profile.js"></script>
  <style>
    :root {
      --bg: #080808;
      --surface: #0f0f0f;
      --surface2: #111111;
      --surface3: #161616;
      --border: rgba(255, 255, 255, .09);
      --border2: rgba(255, 255, 255, .05);
      --accent: #d0d0d0;
      --accent-btn: #d0d0d0;
      --blue: #1d9bf0;
      --green: #00ba7c;
      --text: #e8e8e8;
      --muted: #888;
      --dim: #555;
      --danger: #f4212e;
      --r: 16px;
      --rs: 8px;

      --accent-dim: rgba(208, 208, 208, .08);
      --border-hover: rgba(255, 255, 255, .18);
      --link: #8e7fc4;
      --card-bg: rgba(255, 255, 255, .025);

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;
      --space-7: 48px;
      --space-8: 64px;
      --space-9: 96px;

      --text-xs: 0.78rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.2rem;
      --text-xl: 1.45rem;
      --text-2xl: 1.75rem;
      --text-3xl: 2.15rem;
      --text-4xl: 2.65rem;
      --text-5xl: 3.25rem;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      margin: 0 auto;
      min-height: 100dvh;
      max-width: 600px;
    }

    main {
      min-height: 100dvh;
      border: 1px solid var(--border2);
    }

    #loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #msgBox {
      display: none;
      text-align: center;
      padding: var(--space-9) var(--space-4);
      font-size: var(--text-sm);
      color: var(--muted);
    }

    #profileContainer {
      display: none;
    }

    .banner-wrap {
      position: relative;
      height: 200px;
      background: var(--surface2);
      overflow: hidden;
    }

    .banner-wrap.owner {
      cursor: pointer;
    }

    #bannerImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter .2s;
    }

    .banner-wrap.owner:hover #bannerImg {
      filter: brightness(.7);
    }

    .banner-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      color: #fff;
      font-size: var(--text-sm);
      opacity: 0;
      transition: opacity .2s;
      background: rgba(0, 0, 0, .4);
    }

    .banner-wrap.owner:hover .banner-overlay {
      opacity: 1;
    }

    .avatar-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 var(--space-4);
      margin-top: -42px;
      position: relative;
      z-index: 2;
    }

    .avatar-wrap {
      width: var(--space-9);
      height: var(--space-9);
      border-radius: 50%;
      border: 4px solid var(--bg);
      background: var(--surface2);
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
    }

    .avatar-wrap.owner {
      cursor: pointer;
    }

    #photoPreview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-overlay {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, .55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .2s;
    }

    .avatar-wrap.owner:hover .avatar-overlay {
      opacity: 1;
    }

    .avatar-overlay ion-icon {
      color: #fff;
      font-size: 24px;
    }

    .avatar-actions {
      display: flex;
      gap: var(--space-2);
      padding-bottom: var(--space-2);
      position: absolute;
      bottom: var(--space-1);
      left: 50%;
      transform: translateX(-50%);
    }

    .btn-x {
      padding: 7px var(--space-4);
      border-radius: 20px;
      font-family: inherit;
      font-size: var(--text-xs);
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
      border: none;
      display: none;
      white-space: nowrap;
    }

    .btn-x-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-x-outline:hover {
      background: var(--accent-dim);
    }

    .btn-x-solid {
      background: var(--accent);
      color: #000;
    }

    .btn-x-solid:hover {
      background: #b8b8b8;
    }

    .btn-x-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid #3a1419;
    }

    .btn-x-danger:hover {
      background: rgba(244, 33, 46, .1);
    }

    .profile-body {
      padding: var(--space-3) var(--space-4) var(--space-5);
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: 2px;
    }

    .username {
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.3px;
    }

    #roleIcons {
      display: flex;
      gap: var(--space-2);
      align-items: center
    }

    .role-badge {
      width: 18px;
      height: 18px;
      margin-bottom: -4px
    }

    .handle {
      display: none;
      font-size: var(--text-sm);
      color: var(--muted);
      margin-bottom: var(--space-3);
    }

    #displayBioInput {
      font-size: var(--text-base);
      color: var(--text);
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: var(--space-3);
    }

    .stats-row {
      display: flex;
      gap: var(--space-5);
      margin: var(--space-3) 0;
      flex-wrap: wrap;
    }

    .stat-item,
    .stat-item a {
      font-size: var(--text-sm);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
      text-decoration: none;
    }

    .stat-item .val {
      color: var(--text);
      font-weight: 700;
    }

    .stat-item ion-icon {
      font-size: var(--text-sm);
    }

    #statusEl {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: var(--text-sm);
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--dim);
    }

    #statusEl.online .dot {
      background: var(--green);
    }

    #statusEl.online {
      color: var(--green);
    }

    .divider {
      height: 1px;
      background: var(--border2);
      margin: var(--space-4) 0;
    }

    .social-links {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
    }

    .link_card {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: 6px var(--space-3);
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      font-size: var(--text-base);
      color: var(--muted);
      text-decoration: none;
      transition: all .15s;
      cursor: pointer;
    }

    .link_card:hover {
      border-color: var(--link);
      color: var(--link);
      background: rgba(142, 127, 196, .07);
      margin: 0 var(--space-2);
    }

    .link_card ion-icon {
      font-size: var(--text-sm);
      flex-shrink: 0;
    }

    .del-btn {
      background: none;
      border: none;
      color: var(--dim);
      cursor: pointer;
      font-size: var(--text-xs);
      padding: 0;
      margin-left: var(--space-1);
      line-height: 1;
      transition: color .15s;
    }

    .del-btn:hover {
      color: var(--danger);
    }

    #edit_section {
      background: var(--bg);
      position: fixed;
      top: 16rem;
      left: 50%;
      display: none;
      padding: var(--space-4);
      border-top: 1px solid var(--border2);
      width: min(600px, 100vw);
      transform: translateX(-50%);
      box-sizing: border-box;
      animation: fadeUp .2s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        margin-top: 8px;
      }

      to {
        opacity: 1;
        margin-top: 0px;
      }
    }

    .edit-label {
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin: 0 0 var(--space-2);
    }

    .edit-field {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      font-size: var(--text-sm);
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--rs);
      background: var(--surface2);
      color: var(--text);
      outline: none;
      transition: border-color .15s;
      margin-bottom: var(--space-4);
      resize: vertical;
    }

    .edit-field:focus {
      border-color: var(--link);
    }

    .edit-field::placeholder {
      color: var(--dim);
    }

    .social-add-row {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
      margin-bottom: var(--space-4);
    }

    .social-add-row select,
    .social-add-row input {
      flex: 1;
      min-width: 90px;
      padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs);
      font-family: inherit;
      border: 1px solid var(--border);
      border-radius: var(--rs);
      background: var(--surface2);
      color: var(--text);
      outline: none;
    }

    .social-add-row select:focus,
    .social-add-row input:focus {
      border-color: var(--link);
    }

    .social-add-row select option {
      background: #111;
    }

    .btn-add {
      padding: var(--space-2) var(--space-4);
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 20px;
      font-family: inherit;
      font-size: var(--text-xs);
      font-weight: 700;
      cursor: pointer;
    }

    .btn-add:hover {
      background: #b8b8b8;
    }

    .btn-save-all {
      width: 100%;
      padding: var(--space-3);
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 20px;
      font-family: inherit;
      font-size: var(--text-sm);
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      margin-top: var(--space-1);
    }

    .btn-save-all:hover {
      background: #b8b8b8;
    }

    .btn-save-all:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    #syncPhotoBtn {
      width: 100%;
      padding: var(--space-2);
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: var(--rs);
      font-family: inherit;
      font-size: var(--text-xs);
      cursor: pointer;
      margin-bottom: var(--space-4);
      transition: all .15s;
    }

    #syncPhotoBtn:hover {
      border-color: var(--link);
      color: var(--link);
    }

    .upload-bar-wrap {
      display: none;
      height: 3px;
      background: var(--surface3);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: var(--space-3);
    }

    .upload-bar {
      height: 100%;
      background: var(--link);
      width: 0%;
      transition: width .3s;
    }


    #bannerFileInput,
    #avatarFileInput {
      display: none;
    }

    hr {
      margin: 1rem 0;
      border-color: var(--border2);
    }

    .navbar_section {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      z-index: 100;
    }
  </style>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>

<body>
  <main>
    <div id="loading"><img width="40" src="../img/load.gif" /></div>
    <div id="msgBox"></div>
    <input type="file" id="bannerFileInput" accept="image/*" />
    <input type="file" id="avatarFileInput" accept="image/*" />

    <div id="profileContainer">

      <div class="banner-wrap" id="bannerWrap">
        <img id="bannerImg" alt="" />
        <div class="banner-overlay"><ion-icon name="camera-outline"></ion-icon> change banner</div>
      </div>

      <div class="avatar-row">
        <div style="display:flex; align-items:center; gap:var(--space-3);">
          <div class="avatar-wrap" id="avatarWrap">
            <img id="photoPreview" src="../img/user.jpg" alt="avatar" />
            <div class="avatar-overlay"><ion-icon name="camera-outline"></ion-icon></div>
          </div>
          <div style="margin-top: 28px;">
            <div class="name-row">
              <span class="username" id="currentName"></span>
              <div id="roleIcons"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="profile-body">

        <div id="displayBioInput"></div>
        <div id="statusEl"><span class="dot"></span><span id="statusText">—</span></div>
        <div class="handle" id="handleEl"></div>
        <div class="stats-row">
          <div class="stat-item" id="statJoined">
            <ion-icon name="calendar-outline"></ion-icon>
            <span>joined <span class="val">—</span></span>
          </div>
          <div class="stat-item" id="statComments">
            <ion-icon name="chatbubble-outline"></ion-icon>
            <span>comments: <span class="val">—</span></span>
          </div>
        </div>

        <hr>

        <div id="socialLinks" class="social-links"></div>

        <div id="edit_section">
          <button id="syncPhotoBtn">🔄 sync avatar from Google</button>

          <div class="upload-bar-wrap" id="uploadBarWrap">
            <div class="upload-bar" id="uploadBar"></div>
          </div>

          <p class="edit-label">username</p>
          <input type="text" id="displayNameInput" class="edit-field" placeholder="new username" />

          <p class="edit-label">bio</p>
          <textarea id="bioInput" class="edit-field" rows="3" placeholder="write something..."></textarea>

          <p class="edit-label">add social link</p>
          <div class="social-add-row">
            <select id="platformSelect">
              <option value="twitter">Twitter / X</option>
              <option value="instagram">Instagram</option>
              <option value="facebook">Facebook</option>
              <option value="github">GitHub</option>
              <option value="youtube">YouTube</option>
              <option value="linkedin">LinkedIn</option>
              <option value="email">Email</option>
            </select>
            <input type="text" id="socialUsernameInput" placeholder="username" />
            <button class="btn-add" id="saveSocialBtn">add</button>
          </div>

          <button class="btn-save-all" id="saveAllBtn">Save changes</button>
        </div>

      </div>
    </div>
    <div class="avatar-actions">
      <button class="btn-x btn-x-outline" id="editBtn">Edit profile</button>
      <button class="btn-x btn-x-danger" id="logoutBtn">Logout</button>
    </div>

  </main>


</body>

</html>
