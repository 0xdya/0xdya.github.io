name: visite archiver
on:
  schedule:
    - cron: "0 5 * * *"
    - cron: "0 11 * * *"
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write 
env:
  TARGET_BRANCH: main
  FIREBASE_URL: "https://oxdyaa-default-rtdb.firebaseio.com/visits.json"

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 

      - name: Process Visits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            VISITS=$(curl -s --max-time 15 "${{ env.FIREBASE_URL }}" | tr -d '"')
            [[ "$VISITS" =~ ^[0-9]+$ ]] && break
            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done

          if ! [[ "$VISITS" =~ ^[0-9]+$ ]]; then
            echo "::error::Failed to fetch valid data. Value: $VISITS"
            exit 1
          fi

          if [ -f archive.txt ]; then
            LAST_VISITS=$(grep -oE '[0-9]+ visits' archive.txt | tail -n 1 | grep -oE '[0-9]+' || echo "0")
          else
            touch archive.txt
            LAST_VISITS=0
          fi
          
          DIFF=$((VISITS - LAST_VISITS))
          FORMATTED_VISITS=$(printf "%'d" "$VISITS")
          FORMATTED_DIFF=$(printf "%'d" "$DIFF")
          TODAY=$(TZ=Africa/Algiers date +"%b %d, %Y")
          CURRENT_HOUR=$(date -u +"%H")

          case "$CURRENT_HOUR" in
            "05") TIME="06:00" ;;
            "11") TIME="12:00" ;;
            "22") TIME="23:00" ;;
            *) TIME=$(TZ=Africa/Algiers date +"%H:%M") ;;
          esac

          LAST_DATE=$(grep -E "^[A-Z][a-z]{2} [0-9]{2}, [0-9]{4}$" archive.txt | tail -n 1 || echo "")
          if [ "$TODAY" != "$LAST_DATE" ]; then
            echo -e "\n$TODAY" >> archive.txt
          fi

          echo "$TIME => $FORMATTED_VISITS visits (+$FORMATTED_DIFF)" >> archive.txt
          
          git add archive.txt
          git commit -m "Auto update - $TODAY $TIME (+$FORMATTED_DIFF visits) [skip ci]" || echo "No changes to commit"
          git push
